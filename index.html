<style>
/* 以前のスタイルを継承しつつ、Galaxyと英語用の調整を追加 */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F6F5F1;--bg2:#FFFFFF;--bg3:#EFEDE8;--bg4:#E5E3DC;
  --border:#DDD9D0;--border2:#C4C0B5;
  --text:#1A1916;--text2:#5A5850;--text3:#98958E;
  --accent:#7C5FD4;--accent2:#9B7FF0;--alight:#F0ECFF;--aborder:#C4ADFF;
  --green:#167A50;--gbg:#E6F4EE;--gborder:#8FD9B8;
  --amber:#7A5200;--abg2:#FEF2D8;--aborder2:#F5C060;
  --red:#9E2A2A;--rbg:#FBEBEB;--rborder:#F0BABA;
  --blue:#145898;--bbg:#E4F0FB;--bborder:#A8CCF0;
  --pink:#B21B7E;--pbg:#FBE8F4;--pborder:#E6A4D0;
  --r:12px;--r2:8px;--r3:20px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 18px rgba(0,0,0,.09);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.font-num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
#app{max-width:960px;margin:0 auto;padding:24px 16px}

/* HEADER & TABS */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:10px}
.db-count{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:4px 10px}
.streak{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:6px 14px;font-size:13px;font-weight:500;box-shadow:var(--sh)}

.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--sh);overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:8px 10px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;border-radius:var(--r2);cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(124,95,212,.3)}
.panel{display:none}.panel.active{display:block}
.stitle{font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:1.6px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}

/* COUNTDOWN CARDS */
.cdown-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
@media(max-width:580px){.cdown-grid{grid-template-columns:1fr}}
.cdown-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.cd-toeic::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pink)}
.cd-naist::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.cd-kobe::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.cd-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;margin-bottom:10px;display:inline-block}
.cd-days{font-family:'Inter',sans-serif;font-size:42px;font-weight:800;line-height:1}

/* SUBJECT GRID */
.subj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:24px}
.subj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc-la::before{background:var(--accent)}.sc-ca::before{background:var(--green)}.sc-ml::before{background:var(--blue)}.sc-pr::before{background:var(--amber)}.sc-en::before{background:var(--pink)}

/* FLASH CARDS */
.fc-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;min-height:180px;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;margin-bottom:14px;cursor:pointer;box-shadow:var(--sh);transition:all .2s}
.fc-card.flipped{background:var(--alight);border-color:var(--aborder)}
.fc-q{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.fc-a{font-size:14px;color:var(--text2);line-height:1.7}
.fc-acts{display:flex;gap:8px;justify-content:center}
.fc-btn{padding:10px 20px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-weight:600}

/* GALAXY STYLE */
.galaxy-container{background:#0d0b1a;border-radius:var(--r);overflow:hidden;position:relative;height:500px;border:1px solid var(--border)}
#galaxy-svg{width:100%;height:100%}
.node{cursor:pointer;stroke:#fff;stroke-width:1.5px}
.link{stroke:#555;stroke-opacity:0.4;stroke-width:1px}
.node-label{font-size:10px;fill:#ccc;pointer-events:none;font-family:'Inter'}
.galaxy-overlay{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,0.9);padding:10px;border-radius:var(--r2);font-size:12px;max-width:240px;display:none;border:1px solid var(--accent);box-shadow:var(--sh2)}

/* AI LOGIC STYLE */
.api-key-wrap{background:var(--abg2);border:1px solid var(--aborder2);border-radius:var(--r);padding:12px;margin-bottom:14px;display:flex;gap:10px;align-items:center}
.api-key-inp{flex:1;padding:8px;border-radius:var(--r2);border:1px solid var(--aborder2)}
.ai-gen-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--r2);font-weight:700;cursor:pointer;margin-top:10px}
.ai-spinner{width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.ai-res-body{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-top:14px;line-height:1.8;font-size:14px}
.ai-res-body h3{font-family:'Syne';margin-bottom:10px;color:var(--accent)}
</style>
</head>
<body>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, push, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// Firebase Config
const FB = {apiKey:"AIzaSyAFpjxHFKgOs1ke7g3klzhQxAiOvMwfFRQ",authDomain:"study-tracker-5a35c.firebaseapp.com",databaseURL:"https://study-tracker-5a35c-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"study-tracker-5a35c",appId:"1:1091326221496:web:5bcd5ab27bdc6cca03e84d"};
const fbApp = initializeApp(FB);
const db = getDatabase(fbApp);

/* ══════════════════════════════════════
   DATA: SUBJECTS & FLASHCARDS
══════════════════════════════════════ */
const SUBJECTS = {
  la:{name:'線形代数',cls:'sc-la',dot:'#7C5FD4',chapters:['行列演算','固有値','SVD','次元定理']},
  ca:{name:'微積分',cls:'sc-ca',dot:'#167A50',chapters:['極限','微分','積分','多変数関数']},
  ml:{name:'機械学習',cls:'sc-ml',dot:'#145898',chapters:['回帰','最適化','CNN','Transformer']},
  en:{name:'英語(院試)',cls:'sc-en',dot:'#B21B7E',chapters:['論文表現','TOEIC語彙','CS英単語']}
};

const FC = {
  la:[
    {q:'det(A)=0 の意味は？',a:'行列Aが特異行列（非正則）である。逆行列が存在しない。',tag:'行列式'},
    {q:'固有値の和は何に等しい？',a:'行列のトレース（対角成分の和）に等しい。',tag:'固有値'}
  ],
  ca:[
    {q:'ロピタルの定理の条件は？',a:'0/0または∞/∞の不定形であり、極限が存在すること。',tag:'極限'}
  ],
  ml:[
    {q:'L2正則化の別名は？',a:'Ridge回帰。重みの二乗和をペナルティに加える。',tag:'正則化'}
  ],
  en:[
    {q:'"State-of-the-art" (SOTA)',a:'「最新の」「最高水準の」。論文で手法を比較する際によく使われる。',tag:'論文表現'},
    {q:'"Leverage"',a:'「〜を活用する」。useよりも「（既存のものを）うまく利用する」ニュアンス。',tag:'論文表現'},
    {q:'"Mitigate"',a:'「（悪い影響を）軽減する」。例：mitigate the risk.',tag:'論文表現'},
    {q:'"Empirical"',a:'「経験的な」「実証的な」。理論だけでなく実験に基づいた結果。',tag:'論文表現'},
    {q:'"Implicit"',a:'「暗黙の」。対義語はExplicit（明示的な）。',tag:'CS英単語'},
    {q:'"Subsequent"',a:'「その後の」「次に続く」。例：Subsequent experiments showed...',tag:'TOEIC語彙'}
  ]
};

/* ══════════════════════════════════════
   CORE LOGIC: TABS & STATE
══════════════════════════════════════ */
let mode='flash', subj='la', progressData={};

window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab === 'galaxy') initGalaxy();
  if(tab === 'analytics') renderAnalytics();
};

window.setMode = (m, el) => {
  mode = m;
  document.querySelectorAll('#mode-chips .tab').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderStudy();
};

window.setSubject = (s, el) => {
  subj = s;
  document.querySelectorAll('#subj-chips .tab').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderStudy();
};

/* ══════════════════════════════════════
   STUDY: FLASHCARDS
══════════════════════════════════════ */
let fcState = {cur:0, flipped:false};

function renderStudy(){
  const ct = document.getElementById('study-content');
  const cards = FC[subj] || [];
  if(fcState.cur >= cards.length) fcState.cur = 0;
  
  const card = cards[fcState.cur];
  ct.innerHTML = `
    <div class="fc-card ${fcState.flipped ? 'flipped' : ''}" onclick="flipFC()">
      <div>
        <div class="stitle" style="margin-bottom:10px">${card.tag}</div>
        <div class="${fcState.flipped ? 'fc-a' : 'fc-q'}">${fcState.flipped ? card.a : card.q}</div>
      </div>
    </div>
    <div class="fc-acts">
      <button class="fc-btn" onclick="nextFC(-1)">←</button>
      <button class="fc-btn" onclick="nextFC(1)">OK / 次へ →</button>
    </div>
    <div style="text-align:center; margin-top:10px; font-size:12px; color:var(--text3)">${fcState.cur+1} / ${cards.length}</div>
  `;
}
window.flipFC = () => { fcState.flipped = !fcState.flipped; renderStudy(); };
window.nextFC = (dir) => {
  const cards = FC[subj] || [];
  fcState.cur = (fcState.cur + dir + cards.length) % cards.length;
  fcState.flipped = false;
  renderStudy();
  // ログに記録（簡易）
  if(dir > 0) recordActivity(subj, cards[fcState.cur-1]?.tag);
};

async function recordActivity(s, tag){
  const countRef = ref(db, `activity/${s}/${tag || 'general'}`);
  const snap = await get(countRef);
  set(countRef, (snap.val() || 0) + 1);
}

/* ══════════════════════════════════════
   AI: GEMINI API IMPLEMENTATION
══════════════════════════════════════ */
window.generateGemini = async () => {
  const key = document.getElementById('api-key-gemini').value;
  const s = document.getElementById('ai-subj-sel').value;
  const lv = document.getElementById('ai-level-sel').value;
  
  if(!key) return alert("Gemini API Keyを入力してください");

  const btn = document.querySelector('.ai-gen-btn');
  const spin = document.getElementById('ai-spin');
  btn.disabled = true; spin.style.display = 'inline-block';

  const prompt = `${SUBJECTS[s].name}の${lv}レベルの大学院入試類題を1問作成し、ステップバイステップの解説を付けてください。解答は最後に出力してください。`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    });
    const data = await res.json();
    const resultText = data.candidates[0].content.parts[0].text;
    
    document.getElementById('ai-output').innerHTML = `
      <div class="ai-res-body">
        <h3>🤖 Gemini 生成結果</h3>
        <div style="white-space: pre-wrap;">${resultText}</div>
      </div>
    `;
  } catch (e) {
    alert("エラーが発生しました: " + e.message);
  } finally {
    btn.disabled = false; spin.style.display = 'none';
  }
};

/* ══════════════════════════════════════
   GALAXY: D3.JS INTERACTIVE GRAPH
══════════════════════════════════════ */
function initGalaxy() {
  const width = document.querySelector('.galaxy-container').clientWidth;
  const height = 500;
  
  // Data Structure
  const nodes = [{id: "Root", group: 0, size: 20}];
  const links = [];
  
  Object.keys(SUBJECTS).forEach(k => {
    nodes.push({id: SUBJECTS[k].name, group: k, size: 15});
    links.push({source: "Root", target: SUBJECTS[k].name});
    
    (FC[k] || []).forEach(f => {
      if(!nodes.find(n => n.id === f.tag)){
        nodes.push({id: f.tag, group: k, size: 8, detail: f.a});
        links.push({source: SUBJECTS[k].name, target: f.tag});
      }
    });
  });

  const svg = d3.select("#galaxy-svg");
  svg.selectAll("*").remove();

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("center", d3.forceCenter(width / 2, height / 2));

  const link = svg.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("class", "link");

  const node = svg.append("g")
    .selectAll("circle")
    .data(nodes)
    .join("circle")
    .attr("r", d => d.size)
    .attr("fill", d => SUBJECTS[d.group]?.dot || "#fff")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended))
    .on("click", (e, d) => {
      const over = document.getElementById('galaxy-overlay');
      if(d.detail){
        over.style.display = 'block';
        over.innerHTML = `<strong>${d.id}</strong><br>${d.detail}`;
      } else {
        over.style.display = 'none';
      }
    });

  const label = svg.append("g")
    .selectAll("text")
    .data(nodes)
    .join("text")
    .text(d => d.id)
    .attr("class", "node-label")
    .attr("dx", 12)
    .attr("dy", 4);

  simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });

  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
}

/* ══════════════════════════════════════
   DATA SYNC & OTHERS
══════════════════════════════════════ */
onValue(ref(db, 'logs'), snap => {
  const data = snap.val();
  const list = document.getElementById('log-list');
  if(!data) return list.innerHTML = "記録がありません";
  list.innerHTML = Object.values(data).reverse().map(l => `
    <div style="background:#fff; padding:10px; border-bottom:1px solid #eee; font-size:13px;">
      <strong>${l.date}</strong>: ${l.chapter} (${l.duration}分)
    </div>
  `).join('');
});

function daysUntil(dateStr) {
  const diff = new Date(dateStr) - new Date();
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function initApp(){
  document.getElementById('d-toeic').textContent = daysUntil('2026-05-17');
  document.getElementById('d-naist').textContent = daysUntil('2026-07-06');
  document.getElementById('d-kobe').textContent = daysUntil('2026-08-24');
  renderStudy();
}

initApp();
</script>
