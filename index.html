<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow v29 — 院試対策・AIリサーチ統合版</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']]
  }
};
</script>  
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F6F5F1;--bg2:#FFFFFF;--bg3:#EFEDE8;--bg4:#E5E3DC;
  --border:#DDD9D0;--border2:#C4C0B5;
  --text:#1A1916;--text2:#5A5850;--text3:#98958E;
  --accent:#7C5FD4;--accent2:#9B7FF0;--alight:#F0ECFF;--aborder:#C4ADFF;
  --green:#167A50;--gbg:#E6F4EE;--gborder:#8FD9B8;
  --amber:#7A5200;--abg2:#FEF2D8;--aborder2:#F5C060;
  --red:#9E2A2A;--rbg:#FBEBEB;--rborder:#F0BABA;
  --blue:#145898;--bbg:#E4F0FB;--bborder:#A8CCF0;
  --teal:#0C6A52;--tbg:#DFF2EC;--tborder:#8FD4BE;
  --r:12px;--r2:8px;--r3:20px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 24px rgba(0,0,0,.10);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:1100px;margin:0 auto;padding:24px 16px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.db-count{font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);padding:6px 12px;border-radius:20px}
.streak{font-size:12px;color:var(--amber);background:var(--abg2);border:1px solid var(--aborder2);padding:6px 12px;border-radius:20px;font-weight:700}

.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--sh);overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:8px 14px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;border-radius:var(--r2);cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(124,95,212,.3)}
.panel{display:none}.panel.active{display:block}
.stitle{font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:1.6px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}

/* COUNTDOWN */
.cdown-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
@media(max-width:580px){.cdown-grid{grid-template-columns:1fr}}
.cdown-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.cd-days{font-family:'Inter',sans-serif;font-size:38px;font-weight:800;color:var(--accent)}
.cd-label{font-size:12px;color:var(--text2);margin-top:4px}

/* SUBJECTS GRID */
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.subj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.subj-name{font-weight:700;font-size:14px;margin-bottom:8px}
.prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-text{font-size:11px;color:var(--text3)}

/* GALAXY */
.galaxy-wrap{height:600px;width:100%;background:#05040a;border-radius:var(--r);position:relative;border:1px solid var(--border);margin-bottom:24px;overflow:hidden;box-shadow:var(--sh2)}
#galaxy-svg{width:100%;height:100%;background:radial-gradient(circle,#131129 0%,#000 80%);display:block;cursor:grab}
.galaxy-info{position:absolute;bottom:20px;left:20px;background:rgba(13,11,26,0.96);padding:18px;border-radius:10px;border:1px solid var(--accent);max-width:350px;display:none;backdrop-filter:blur(15px);z-index:100;box-shadow:var(--sh);color:#fff;font-size:13px}

/* CHIPS */
.chips{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto;padding-bottom:5px;flex-wrap:wrap}
.chip{padding:10px 18px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:20px;cursor:pointer;font-size:11px;white-space:nowrap;transition:0.2s}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(124,95,212,0.1)}

/* FLASHCARD */
.fc-card{min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:20px;font-weight:700;cursor:pointer;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:40px;line-height:1.6;transition:all 0.3s;box-shadow:var(--sh);user-select:none}
.fc-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,95,212,.12)}
.fc-card.flipped{background:var(--alight);border-color:var(--accent)}
.fc-hint{font-size:12px;color:var(--text3);margin-top:8px}
.fc-nav{display:flex;gap:10px;margin-top:16px;align-items:center;justify-content:space-between}
.fc-counter{font-size:12px;color:var(--text3)}
.btn-row{display:flex;gap:8px;margin-top:12px}

/* FILL-IN-BLANK */
.fib-wrap{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:30px;margin-bottom:16px;box-shadow:var(--sh)}
.fib-q{font-size:18px;font-weight:600;line-height:2;margin-bottom:16px}
.fib-input{border:2px solid var(--accent);border-radius:8px;padding:8px 14px;font-size:16px;font-weight:700;background:var(--alight);color:var(--accent);text-align:center;width:160px;outline:none;font-family:'Inter',sans-serif}
.fib-input.correct{border-color:var(--green);background:var(--gbg);color:var(--green)}
.fib-input.wrong{border-color:var(--red);background:var(--rbg);color:var(--red)}
.fib-result{font-size:13px;margin-top:12px;padding:10px 14px;border-radius:8px;display:none}
.fib-result.ok{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.fib-result.ng{background:var(--rbg);color:var(--red);border:1px solid var(--rborder)}

/* QUIZ */
.quiz-q{font-size:18px;font-weight:700;margin-bottom:20px;line-height:1.6}
.quiz-opts{display:grid;gap:10px}
.quiz-opt{padding:14px 18px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:14px;text-align:left;transition:all .18s;font-family:'DM Sans',sans-serif;color:var(--text)}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);background:var(--alight);color:var(--accent)}
.quiz-opt.correct{border-color:var(--green);background:var(--gbg);color:var(--green);font-weight:700}
.quiz-opt.wrong{border-color:var(--red);background:var(--rbg);color:var(--red)}
.quiz-explain{font-size:13px;color:var(--text2);background:var(--bg3);border-radius:8px;padding:12px;margin-top:14px;display:none;line-height:1.7}

/* CHAPTER TEST */
.test-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.test-progress{font-family:'Inter',sans-serif;font-size:13px;color:var(--text2)}
.test-score-bar{height:6px;background:var(--bg3);border-radius:3px;margin-bottom:20px;overflow:hidden}
.test-score-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.test-result{text-align:center;padding:40px;background:var(--bg2);border-radius:var(--r);border:2px solid var(--accent)}
.test-result-score{font-family:'Inter',sans-serif;font-size:56px;font-weight:800;color:var(--accent)}
.test-result-label{font-size:14px;color:var(--text2);margin-top:6px}
.test-result-msg{font-size:18px;font-weight:700;margin-top:20px}
.badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-gold{background:#FFF3C4;color:#92600A;border:1px solid #F5C060}
.badge-silver{background:#F0F0F0;color:#555;border:1px solid #CCC}
.badge-pass{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.badge-fail{background:var(--rbg);color:var(--red);border:1px solid var(--rborder)}

/* ENGLISH CARDS */
.en-card{background:linear-gradient(135deg,#1a1040 0%,#2d1b69 100%);border-radius:var(--r);padding:36px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;box-shadow:0 8px 32px rgba(124,95,212,.25);cursor:pointer;transition:transform .2s}
.en-card:hover{transform:translateY(-3px)}
.en-word{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.en-phonetic{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px}
.en-meaning{font-size:16px;color:rgba(255,255,255,0.9);display:none}
.en-example{font-size:13px;color:rgba(255,255,255,0.6);font-style:italic;margin-top:8px;display:none}
.en-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);margin-bottom:12px}

/* ANALYTICS */
.ana-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.ana-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--sh)}
.ana-val{font-family:'Inter',sans-serif;font-size:32px;font-weight:800;margin-bottom:4px;color:var(--accent)}
.ana-label{font-size:11px;color:var(--text3)}
.acc-bar{display:flex;gap:4px;margin-top:6px;align-items:center}
.acc-dot{width:10px;height:10px;border-radius:50%}
.heatmap-row{display:flex;gap:3px;margin-bottom:3px;align-items:center}
.heatmap-cell{width:14px;height:14px;border-radius:3px;background:var(--bg3);transition:all .2s}
.heatmap-cell:hover{transform:scale(1.4);z-index:10;position:relative}

/* AI PANEL */
.api-config-area{background:var(--abg2);border:1px solid var(--aborder2);padding:20px;border-radius:var(--r);margin-bottom:20px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);padding:12px;border-radius:var(--r2);width:100%;margin-bottom:12px;outline:none;font-family:inherit;color:var(--text);font-size:14px}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r2);cursor:pointer;font-weight:700;width:100%;transition:0.2s;font-family:'DM Sans',sans-serif;font-size:14px}
.btn-p:hover{opacity:0.88;transform:translateY(-1px)}
.btn-p:disabled{opacity:0.5;transform:none;cursor:not-allowed}
.btn-sm{padding:8px 16px;width:auto;font-size:12px}
.btn-g{background:var(--green)}
.btn-b{background:var(--blue)}
#ai-debug-log{color:var(--red);font-size:11px;font-family:monospace;margin-top:15px;background:rgba(255,0,0,0.05);padding:12px;border-radius:8px;white-space:pre-wrap;display:none;border:1px solid var(--rborder)}

/* LOG */
.log-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px}
.log-topic{font-weight:600;font-size:14px}
.log-meta{font-size:11px;color:var(--text3);margin-top:2px}
.log-dur{font-family:'Inter',sans-serif;font-weight:700;color:var(--accent)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--r2);font-size:13px;font-weight:600;z-index:9999;box-shadow:var(--sh2);transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

/* MODE TABS (inner) */
.mode-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.mode-tab{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:0.2s}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* PROGRESS RING */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
svg.ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">Study<span>Flow</span> <span style="font-size:11px;font-weight:400;color:var(--text3)">v29</span></div>
    <div class="header-right">
      <div id="db-count" class="db-count">📊 読み込み中...</div>
      <div id="streak-count" class="streak">🔥 0日連続</div>
    </div>
  </div>

  <div class="tabs" id="main-tabs">
    <button class="tab active" onclick="switchTab('plan')">📊 プラン</button>
    <button class="tab" onclick="switchTab('study')">📚 専門演習</button>
    <button class="tab" onclick="switchTab('english')">🇬🇧 英語</button>
    <button class="tab" onclick="switchTab('chapter')">📋 章末テスト</button>
    <button class="tab" onclick="switchTab('galaxy')">🌌 銀河系</button>
    <button class="tab" onclick="switchTab('ai')">🤖 AI生成</button>
    <button class="tab" onclick="switchTab('analytics')">📈 分析</button>
    <button class="tab" onclick="switchTab('log')">📝 ログ</button>
  </div>

  <!-- PLAN PANEL -->
  <div id="panel-plan" class="panel active">
    <div class="stitle">試験カウントダウン</div>
    <div class="cdown-grid">
      <div class="cdown-card" style="border-top:3px solid var(--teal)">
        <div class="cd-days" id="d-toeic">--</div>
        <div class="cd-label">TOEIC <span style="color:var(--text3)">5/17</span></div>
      </div>
      <div class="cdown-card" style="border-top:3px solid var(--accent)">
        <div class="cd-days" id="d-naist">--</div>
        <div class="cd-label">NAIST <span style="color:var(--text3)">7/6</span></div>
      </div>
      <div class="cdown-card" style="border-top:3px solid var(--blue)">
        <div class="cd-days" id="d-kobe">--</div>
        <div class="cd-label">神戸大 <span style="color:var(--text3)">8/24</span></div>
      </div>
    </div>
    <div class="stitle">科目別進捗</div>
    <div id="subj-grid" class="subj-grid"></div>

    <div class="stitle" style="margin-top:8px">今週の学習リング</div>
    <div class="card" style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center;padding:28px">
      <div id="rings-wrap" style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center"></div>
    </div>
  </div>

  <!-- STUDY PANEL -->
<div id="panel-study" class="panel">
  <div class="stitle">科目選択</div>
  <div id="subj-chips" class="chips"></div>

  <!-- サブタブ設定 -->
  <div class="mode-tabs" id="study-mode-tabs">
    <button class="mode-tab active" onclick="setStudyMode('fc', this)">🃏 専門用語カード</button>
    <button class="mode-tab" onclick="setStudyMode('fib', this)">✏️ 穴埋め</button>
    <button class="mode-tab" onclick="setStudyMode('quiz', this)">📝 4択クイズ</button>
    <button class="mode-tab" onclick="setStudyMode('ai_bank', this)">🤖 AIストック</button>
  </div>

  <div id="study-content"></div>
</div>

  <!-- ENGLISH PANEL -->
  <div id="panel-english" class="panel">
    <div class="stitle">英語フラッシュカード (Firebase同期)</div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setEnMode('card',this)">🃏 カード</button>
      <button class="mode-tab" onclick="setEnMode('quiz',this)">📝 4択</button>
      <button class="mode-tab" onclick="setEnMode('add',this)">➕ 追加</button>
    </div>
    <div id="en-content"></div>
  </div>

  <!-- CHAPTER TEST PANEL -->
  <div id="panel-chapter" class="panel">
    <div class="stitle">章末テスト</div>
    <div id="chapter-content"></div>
  </div>

  <!-- GALAXY PANEL -->
  <div id="panel-galaxy" class="panel">
    <div class="galaxy-wrap" id="galaxy-container">
      <svg id="galaxy-svg"></svg>
      <div class="galaxy-info" id="galaxy-info">
        <button onclick="document.getElementById('galaxy-info').style.display='none'" style="float:right;background:none;border:none;color:#fff;cursor:pointer;font-size:16px">✕</button>
        <div id="galaxy-info-content"></div>
      </div>
    </div>
  </div>

  <!-- AI PANEL -->
<div id="panel-ai" class="panel">
  <div class="api-config-area">
    <div class="stitle">🔑 Gemini API キー</div>
    <input type="password" id="api-key-input" placeholder="AIzaSy...">
    <button class="btn-p btn-sm" onclick="saveApiKey()" style="width:auto">保存</button>
  </div>

  <div class="card">
    <div class="stitle">AI問題生成 (Gemini)</div>
    
    <!-- 科目選択：onchangeを追加 -->
    <select id="ai-subj-sel" onchange="updateSubtopics()">
      <option value="体系的用語解説">体系的用語解説 (カード用)</option>
      <option value="線形代数">線形代数</option>
      <option value="微積分">微積分</option>
      <option value="アルゴリズム">アルゴリズム</option>
      <option value="機械学習">機械学習</option>
      <option value="複素関数論">複素関数論</option>
      <option value="常微分方程式">常微分方程式</option>
      <option value="英語(TOEIC)">英語 (TOEIC)</option>
    </select>

    <!-- トピック選択欄：これを復活させる -->
    <select id="ai-topic-sel">
      <option value="ランダム">トピックをランダムに選択</option>
    </select>
    
    <!-- 形式選択 -->
    <select id="ai-type-sel">
      <option value="計算問題">計算問題</option>
      <option value="穴埋め問題">穴埋め問題</option>
      <option value="4択問題">4択問題</option>
      <option value="体系的用語解説">体系的用語解説</option>
    </select>

    <button class="btn-p" id="ai-btn" onclick="askGemini()">🤖 問題を生成</button>

    <!-- 出力エリア -->
    <div id="ai-output" style="display:none;margin-top:20px" class="card">
      <div id="ai-txt" style="white-space:pre-wrap;font-size:14px;line-height:1.8"></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn-p btn-sm btn-g" onclick="saveAI()">演習に追加</button>
        <button class="btn-p btn-sm btn-b" onclick="copyAI()">コピー</button>
      </div>
    </div>
    <div id="ai-debug-log"></div>
  </div>
</div>

  <!-- ANALYTICS PANEL -->
  <div id="panel-analytics" class="panel">
    <div class="stitle">サマリー</div>
    <div class="ana-grid" id="ana-summary"></div>
    <div class="stitle">正答率ランキング</div>
    <div class="card" id="acc-ranking"></div>
    <div class="stitle">学習ヒートマップ (過去4週)</div>
    <div class="card" id="heatmap-wrap"></div>
  </div>

  <!-- LOG PANEL -->
  <div id="panel-log" class="panel">
    <div class="card">
      <div class="stitle">学習ログ追加</div>
      <input type="text" id="log-chap" placeholder="習得トピック (例: 固有値分解)">
      <select id="log-subj-sel">
        <option value="la">線形代数</option><option value="ca">微積分</option>
        <option value="cf">複素関数</option><option value="de">常微分</option>

══════════════════════════════════════ */
function recordAcc(cat, correct) {
  if(!accuracy[cat]) accuracy[cat] = {ok:0,ng:0};
  correct ? accuracy[cat].ok++ : accuracy[cat].ng++;
  localStorage.setItem('study_v29_acc', JSON.stringify(accuracy));
}
function getAcc(cat) {
  const d = accuracy[cat];
  if(!d || d.ok+d.ng===0) return null;
  return Math.round(d.ok/(d.ok+d.ng)*100);
}
window.recordAcc = recordAcc;

function renderPlan() {
  const diff = t => Math.max(0, Math.ceil((new Date(t)-new Date())/(1000*60*60*24)));
  document.getElementById('d-toeic').textContent = diff('2026-05-17');
  document.getElementById('d-naist').textContent = diff('2026-07-06');
  document.getElementById('d-kobe').textContent = diff('2026-08-24');

  // Subject grid
  const grid = document.getElementById('subj-grid');
  grid.innerHTML = '';
  Object.entries(SUBJECTS).forEach(([k,s]) => {
    const acc = getAcc(k);
    const total = BANK.filter(b=>b.cat===k).length;
    const pct = acc ?? 0;
    grid.innerHTML += `
      <div class="subj-card">
        <div class="subj-name" style="color:${s.color}">${s.name}</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${s.color}"></div></div>
        <div class="prog-text">正答率 ${acc!==null?acc+'%':'未解答'} · ${total}問</div>
      </div>`;
  });

  // Rings
  const rw = document.getElementById('rings-wrap');
  rw.innerHTML = '';
  const allLogs = [...logs, ...Object.values(fbLogs)];
  
  Object.entries(SUBJECTS).forEach(([k,s]) => {
    // 過去7日間の学習時間を集計
    const weekMins = allLogs
      .filter(l => {
        const logDate = new Date(l.date || l.added);
        const diffTime = Date.now() - logDate.getTime();
        return l.cat === k && diffTime < 7 * 24 * 3600 * 1000;
      })
      .reduce((a,l) => a + (parseInt(l.dur) || 0), 0);

    const goal = 120; // 目標：週120分
    const pct = Math.min(1, weekMins / goal);
    const r=30, circ=2*Math.PI*r;
    
    rw.innerHTML += `
      <div class="ring-wrap">
        <svg class="ring" width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="${r}"/>
          <circle class="ring-fill" cx="40" cy="40" r="${r}"
            stroke="${s.color}" stroke-dasharray="${circ}"
            stroke-dashoffset="${circ * (1 - pct)}"/>
        </svg>
        <div style="font-size:10px;font-weight:700;color:var(--text2);text-align:center;margin-top:4px">${s.name}</div>
        <div style="font-size:10px;color:${s.color};font-weight:800">${weekMins}m</div>
      </div>`;
  });
}

window.startChapterTest = (subj) => {
  const fc = BANK.filter(b=>b.cat===subj);
  const qz = (QUIZZES[subj]||[]).map(q=>({...q,type:'quiz'}));
  const all = [
    ...fc.slice(0,5).map(f=>({...f,type:'fc'})),

  ].sort(()=>Math.random()-.5).slice(0,10);

  testState = {subj, items:all, idx:0, score:0, total:all.length, answers:[]};
  renderTestQuestion();
};

function renderTestQuestion() {
  const cont = document.getElementById('chapter-content');
  const {items, idx, score, total} = testState;
  if(idx >= total){ renderTestResult(); return; }
  const it = items[idx];
  const pct = idx/total*100;
  const s = SUBJECTS[testState.subj];

  let qHTML = '';
  if(it.type==='fc'){
    qHTML = `
      <div class="quiz-q">${it.q}</div>
      <div style="margin-bottom:16px"><textarea id="test-inp" rows="2" placeholder="答えを入力..." style="resize:vertical"></textarea></div>
      <div class="btn-row">

    `;
  } else {
    const opts = it.o.map((o,i)=>`<button class="quiz-opt" id="to${i}" onclick="testQuizAns(${i},${it.a})">${String.fromCharCode(65+i)}. ${o}</button>`).join('');
    qHTML = `<div class="quiz-q">${it.q}</div><div class="quiz-opts">${opts}</div>

  }

  cont.innerHTML = `
    <div class="test-header">
      <div><span style="font-size:12px;color:var(--text3)">問 ${idx+1} / ${total}</span></div>
      <div class="test-progress">スコア ${score} / ${idx}</div>
    </div>
    <div class="test-score-bar"><div class="test-score-fill" style="width:${pct}%;background:${s.color}"></div></div>

    <div class="btn-row" style="margin-top:8px">

function initGalaxy() {
  const wrap = document.getElementById('galaxy-container');
  if (!wrap) return;
  const width = wrap.clientWidth, height = wrap.clientHeight;
  
  const nodes = [];
  const links = [];

  // 1. 中心ノード (RESEARCH THEME)
  nodes.push({ id: 'RESEARCH', name: RESEARCH_THEME.name, r: 30, type: 'core', color: RESEARCH_THEME.color });

  // 2. 研究手法ノードの展開
  Object.entries(RESEARCH_THEME.children).forEach(([key, val]) => {
    nodes.push({ id: key, name: val.name, r: 18, type: 'res_area', color: RESEARCH_THEME.color });
    links.push({ source: 'RESEARCH', target: key, distance: 100 });
    
    val.methods.forEach(m => {
      nodes.push({ id: m, name: m, r: 10, type: 'method', color: '#FFA502' });
      links.push({ source: key, target: m, distance: 60 });
    });
  });

  // 3. 基礎科目ノードの展開
  Object.entries(SUBJECTS).forEach(([id, s]) => {
    nodes.push({ id: id, name: s.name, r: 20, type: 'subj', color: s.color });
    // 科目からその下の学習項目(BANK)へ
    BANK.filter(b => b.cat === id).forEach((k, i) => {
      const kid = `k_${id}_${i}`;
      nodes.push({ id: kid, name: k.q.slice(0, 10), detail: k.a, r: 6, type: 'fact', color: s.color });
      links.push({ source: id, target: kid, distance: 50 });
    });
  });

  // 4. 「知識の架け橋」リンクの追加
  KNOWLEDGE_BRIDGES.forEach(b => {
    links.push({ source: b.from, target: b.to, type: 'bridge', desc: b.desc });
  });

  // --- D3 Simulation ---
  const svg = d3.select('#galaxy-svg');
  svg.selectAll('*').remove();
  const g = svg.append('g');

  const zoom = d3.zoom().scaleExtent([0.1, 5]).on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(zoom);

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.distance || 80))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => d.r + 15));

  // エッジ（線）の描画
  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', d => d.type === 'bridge' ? '#666' : '#333')
    .attr('stroke-dasharray', d => d.type === 'bridge' ? '4 2' : '0')
    .attr('stroke-width', d => d.type === 'bridge' ? 2 : 1)
    .attr('stroke-opacity', 0.6);

  // ノード（点）の描画
  const node = g.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));

  node.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.color)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5)
    .style('cursor', 'pointer')
    .on('click', (e, d) => {
      const info = document.getElementById('galaxy-info');
      const content = document.getElementById('galaxy-info-content');
      
      let html = `<h4 style="color:${d.color}">${d.name}</h4>`;
      if (d.detail) html += `<p>${d.detail}</p>`;
      
      // ブリッジ情報の表示
      const connectedBridges = links.filter(l => l.type === 'bridge' && (l.source.id === d.id || l.target.id === d.id));
      if (connectedBridges.length > 0) {
        html += `<div style="margin-top:10px; border-top:1px solid #444; padding-top:5px; font-size:11px;"><b>研究・応用との繋がり:</b><br>`;
        connectedBridges.forEach(b => {
          html += `・${b.desc}<br>`;
        });
        html += `</div>`;
      }
      
      content.innerHTML = html;
      info.style.display = 'block';
    });

  node.append('text')
    .text(d => d.name)
    .attr('fill', '#fff')
    .attr('font-size', d => d.type === 'core' ? '14px' : '10px')
    .attr('dx', d => d.r + 5)
    .attr('dy', '4px')
    .style('pointer-events', 'none')
    .style('text-shadow', '0 0 4px #000');

  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragstarted(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragended(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }
}

let lastAIRes = '';
let lastUsedTopic = ''; // 生成されたトピックを保存時に使うために記憶する

// プロンプト生成ロジック
const buildStudyPrompt = (subj, type) => {
  // ドロップダウンから選択されている値（「ランダム」or「具体的なトピック」）を取得
  const topicSel = document.getElementById('ai-topic-sel');
  const selectedTopic = topicSel ? topicSel.value : "ランダム";
  
  const list = TOPIC_LIBRARY[subj] || ['基礎概念'];
  let topicDirective = "";
  
  if (selectedTopic === "ランダム") {
    // ランダムが選ばれていたら、内部で1つ選ぶ
    lastUsedTopic = list[Math.floor(Math.random() * list.length)];
    topicDirective = `以下のリストからトピックを1つ厳選し、そのトピックに集中した問題を作成せよ: [${list.join(', ')}]。\n今回の指定トピック: 「${lastUsedTopic}」`;
  } else {
    // 特定のトピックが選ばれていたら、それを使う
    lastUsedTopic = selectedTopic;
    topicDirective = `本日の指定トピックは「${lastUsedTopic}」である。このテーマに厳密に沿った問題を作成せよ。`;
  }
  // 「体系的用語解説」専用のフォーマット
  if (type === "体系的用語解説") {
    return `
# 指示: ${subj}の重要用語「${lastUsedTopic}」について、大学院入試・研究レベルの体系的解説を作成せよ。

# 構成ルール (厳守):
1. **【概念の定義】**: 1行で本質を簡潔に。
2. **【数学的・技術的背景】**: 
   - 数式（\\( ... \\) または $$ ... $$）を用いた厳密な定義や導出。
   - 行列を用いる場合は \\\\begin{pmatrix} 形式を使用。
3. **【研究・応用における役割】**: 
   - 特に「変化点検出」や「時系列解析」における有用性。
   - 他の手法との比較（メリット・デメリット）。
4. **【重要キーワード】**: 関連する用語を3つ。
# ルール:
- 日本語で記述。挨拶不要。
- 具体的かつ明快な説明を心がけること。
`.trim();
  }
  
  return `
# 指示: ${subj}の「${lastUsedTopic}」に関する${type}を作成せよ。
# トピック詳細:
${topicDirective}

# 構成: 【問題】【解法のポイント】【詳細ステップ解説】【最終回答】
# 数式ルール:
- 文中の数式は \\( ... \\) 、独立行は $$ ... $$ を使用。
- 行列の改行は \\\\\\\\ (バックスラッシュ4つ) を厳守せよ。
- 行列は \\\\begin{pmatrix} ... \\\\end{pmatrix} を使用せよ。

# ルール:
- 日本語で記述。挨拶不要。
- 具体的かつ計算しやすい整数値を設定すること。
  `.trim();
};

window.askGemini = async () => {
  const key = localStorage.getItem('studyflow_gemini_v29');
  if(!key){ toast('Gemini APIキーを設定してください','err'); return; }
  
  const subj = document.getElementById('ai-subj-sel').value;
  const type = document.getElementById('ai-type-sel').value;
  const out = document.getElementById('ai-output');
  const txt = document.getElementById('ai-txt');
  const btn = document.getElementById('ai-btn');
  const debug = document.getElementById('ai-debug-log');

  out.style.display = 'block'; 
  txt.textContent = '生成中...'; 
  debug.style.display = 'none'; 
  debug.textContent = ''; 
  btn.disabled = true;

  const prompt = buildStudyPrompt(subj, type);
  const models = ['gemini-3.1-flash-lite-preview', 'gemini-3-flash-preview', 'gemini-2.0-flash-001'];
  let success = false;

  for(const m of models){
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const data = await res.json();
      
      if(data.error){
        debug.style.display = 'block';
        debug.textContent += `[${m}] ${data.error.code}: ${data.error.message}\n`;
        continue;
      }
      
      if(data.candidates?.[0]?.content){
        lastAIRes = data.candidates[0].content.parts[0].text;
        txt.style.lineHeight = "1.8";
        txt.innerHTML = marked.parse(lastAIRes);
        if(window.MathJax) MathJax.typesetPromise([txt]);
        success = true; 
        break;
      }
    } catch(e) {
      debug.style.display = 'block';
      debug.textContent += `[${m}] 接続エラー\n`;
    }
  }
  
  if(!success) txt.textContent = '生成失敗。デバッグログを確認してください。';
  btn.disabled = false;
};

window.updateSubtopics = () => {
  const subj = document.getElementById('ai-subj-sel').value;
  const topicSel = document.getElementById('ai-topic-sel');
  if(!topicSel) return;
  topicSel.innerHTML = '<option value="ランダム">トピックをランダムに選択</option>';
  if(TOPIC_LIBRARY[subj]) {
    TOPIC_LIBRARY[subj].forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      topicSel.appendChild(opt);
    });
  }
};
  
window.saveAI = () => {
  if(!lastAIRes){ toast('まず問題を生成してください','err'); return; }
  const subj = document.getElementById('ai-subj-sel').value;
  const typeKey = document.getElementById('ai-type-sel').value;
  
  const catMap = {'線形代数':'la','微積分':'ca','複素関数論':'cf','常微分方程式':'de','機械学習':'ml','アルゴリズム':'cs','英語(TOEIC)':'en','変化点検出':'cpd'};
  const cat = catMap[subj] || 'la';

  // AI生成問題の形式判定
  let type = 'fc';
  if(typeKey === '穴埋め問題') type = 'fib';
  if(typeKey === '4択問題') type = 'quiz';

  BANK.push({
    cat: cat,
    type: type,
    isAI: true, // これにより専門演習の「AIストック」に分類される
    q: `[AI解説] ${lastUsedTopic}`,
    a: lastAIRes,
    area: lastUsedTopic
  });

  localStorage.setItem('study_v29_bank', JSON.stringify(BANK));
  toast(`${lastUsedTopic}をAIストックに追加しました！`);
  
  // 専門演習タブのAIストックモードへ移動
  switchTab('study');
  const aiStockBtn = document.querySelectorAll('#study-mode-tabs .mode-tab')[3];
  setStudyMode('ai_bank', aiStockBtn);
};
  
window.copyAI = () => {
  if(!lastAIRes) return;
  navigator.clipboard.writeText(lastAIRes).then(() => toast('コピーしました！'));
};

/* ══════════════════════════════════════
   ANALYTICS
══════════════════════════════════════ */
function renderAnalytics() {
  const allLogs = [...logs, ...Object.values(fbLogs)];
  const totalMin = allLogs.reduce((a,l)=>a+(l.dur||0),0);
  const totalSessions = allLogs.length;
  const totalQ = Object.values(accuracy).reduce((a,v)=>a+v.ok+v.ng,0);
  const avgAcc = Object.values(accuracy).length
    ? Math.round(Object.values(accuracy).reduce((a,v)=>a+(v.ok+v.ng>0?v.ok/(v.ok+v.ng):0),0)/Object.values(accuracy).length*100)
    : 0;

  document.getElementById('ana-summary').innerHTML = `
    <div class="ana-card"><div class="ana-val">${Math.round(totalMin/60*10)/10}h</div><div class="ana-label">総学習時間</div></div>
    <div class="ana-card"><div class="ana-val">${totalSessions}</div><div class="ana-label">セッション数</div></div>
    <div class="ana-card"><div class="ana-val">${totalQ}</div><div class="ana-label">解答問題数</div></div>
    <div class="ana-card"><div class="ana-val">${avgAcc}%</div><div class="ana-label">平均正答率</div></div>
  `;

  // Accuracy ranking
  const ranking = Object.entries(SUBJECTS).map(([k,s])=>{
    const acc = getAcc(k);
    return {name:s.name,color:s.color,acc};
  }).sort((a,b)=>(b.acc??-1)-(a.acc??-1));

  document.getElementById('acc-ranking').innerHTML = ranking.map((r,i)=>`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div style="width:20px;font-size:12px;color:var(--text3)">#${i+1}</div>
      <div style="width:72px;font-size:13px;font-weight:600;color:${r.color}">${r.name}</div>
      <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${r.acc??0}%;background:${r.color};border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="width:40px;font-size:13px;font-weight:700;text-align:right">${r.acc!==null?r.acc+'%':'—'}</div>
    </div>`).join('');

  // Heatmap (last 28 days)
  const hmap = document.getElementById('heatmap-wrap');
  const days = Array.from({length:28},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-27+i);
    return d.toISOString().slice(0,10);
  });
  const dayMins = {};
  allLogs.forEach(l=>{
    const d=new Date(l.date).toISOString().slice(0,10);
    dayMins[d]=(dayMins[d]||0)+(l.dur||0);
  });
  const maxMin = Math.max(1,...Object.values(dayMins));
  const rows=[];
  for(let w=0;w<4;w++){
    const cells = days.slice(w*7,(w+1)*7).map(d=>{
      const m=dayMins[d]||0;
      const int=Math.round(m/maxMin*255);
      const col=m>0?`rgba(124,95,212,${0.2+m/maxMin*0.8})`:'var(--bg3)';
      return `<div class="heatmap-cell" style="background:${col}" title="${d}: ${m}分"></div>`;
    }).join('');
    rows.push(`<div class="heatmap-row">${cells}</div>`);
  }
  hmap.innerHTML = `<div style="display:flex;flex-direction:column;gap:3px">${rows.join('')}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px">過去28日間の学習強度 (濃いほど学習時間が長い)</div>`;
}

   LOG
══════════════════════════════════════ */
function addLogEntry(topic, cat, dur) {
  const entry = {topic, cat, dur, date: new Date().toISOString()};
  logs.push(entry);
  localStorage.setItem('study_v29_logs', JSON.stringify(logs));
  try{ push(ref(db,'studylogs'), entry); }catch(e){}
}

window.addLog = async () => {
  const topic = document.getElementById('log-chap').value.trim();
  const cat = document.getElementById('log-subj-sel').value;
  const dur = parseInt(document.getElementById('log-dur').value)||0;
  if(!topic){toast('トピックを入力してください','err');return;}
  addLogEntry(topic, cat, dur);
  toast('ログを保存しました！');
  document.getElementById('log-chap').value='';
  document.getElementById('log-dur').value='';
  renderLogs();
  renderPlan();
};

function renderLogs() {
  const allLogs = [
    ...logs.map(l=>({...l,src:'local'})),
    ...Object.values(fbLogs).map(l=>({...l,src:'fb'}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const list = document.getElementById('log-list');
  if(!list) return;
  list.innerHTML = allLogs.slice(0,30).map(l=>`
    <div class="log-item">
      <div>
        <div class="log-topic">${l.topic||'（無題）'}</div>
        <div class="log-meta">${SUBJECTS[l.cat]?.name||l.cat||'不明'} · ${new Date(l.date).toLocaleDateString('ja-JP')} ${l.src==='fb'?'☁️':''}</div>
      </div>
      <div class="log-dur">${l.dur||0}分</div>
    </div>`).join('');
}

function updateStreak() {
  const allLogs = [...logs, ...Object.values(fbLogs)];
  const dates = [...new Set(allLogs.map(l=>new Date(l.date).toDateString()))];
  let streak=0, d=new Date();
  while(dates.includes(d.toDateString())){
    streak++;
    d.setDate(d.getDate()-1);
  }
  document.getElementById('streak-count').textContent = `🔥 ${streak}日連続`;
}
