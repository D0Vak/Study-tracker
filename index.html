<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow v8 — 究極の院試・TOEIC学習システム</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{
  --bg:#070610;--bg2:#0D0B1A;--bg3:#1A1830;
  --border:#2A2845;--text:#F6F5F1;--text2:#98958E;
  --accent:#7C5FD4;--accent2:#9B7FF0;
  --pink:#B21B7E;--green:#167A50;--amber:#7A5200;--blue:#145898;
  --r:12px;--sh:0 4px 20px rgba(0,0,0,0.5);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;overflow-x:hidden}
#app{max-width:1000px;margin:0 auto;padding:20px}

/* HEADER & TABS */
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.logo{font-family:'Syne';font-size:24px;font-weight:800}
.logo span{color:var(--accent)}

.tabs{display:flex;gap:5px;background:var(--bg2);padding:5px;border-radius:var(--r);margin-bottom:20px;border:1px solid var(--border)}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-weight:600;font-size:13px;transition:0.2s}
.tab.active{background:var(--accent);color:#fff}

/* GALAXY BOX */
.galaxy-wrap{height:500px;background:radial-gradient(circle at center, #131129 0%, #070610 100%);border-radius:var(--r);position:relative;border:1px solid var(--border);margin-bottom:20px;overflow:hidden}
#galaxy-svg{width:100%;height:100%}
.galaxy-info{position:absolute;bottom:15px;left:15px;background:rgba(0,0,0,0.7);padding:12px;border-radius:8px;border:1px solid var(--accent);max-width:280px;display:none;backdrop-filter:blur(5px)}

/* CARD STYLES */
.panel{display:none}.panel.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:15px}
.stitle{font-family:'Syne';font-size:12px;color:var(--accent);letter-spacing:1px;margin-bottom:10px}

/* ADD WORD FORM */
.input-group{display:flex;gap:8px;margin-bottom:15px}
input, select, textarea{background:var(--bg3);border:1px solid var(--border);color:#fff;padding:12px;border-radius:8px;flex:1}
button.primary{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold}

/* STUDY MODE */
.study-modes{display:flex;gap:8px;margin-bottom:15px}
.mode-btn{padding:8px 15px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:20px;cursor:pointer;font-size:12px}
.mode-btn.active{border-color:var(--accent);color:var(--accent)}

.fc-card{min-height:200px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:20px;font-weight:bold;cursor:pointer;background:var(--bg3);border-radius:var(--r);border:2px solid var(--border)}
.fc-card.flipped{border-color:var(--accent);background:var(--bg2)}

/* QUIZ */
.quiz-opt{display:block;width:100%;padding:12px;text-align:left;background:var(--bg3);border:1px solid var(--border);color:#fff;margin-top:8px;border-radius:8px;cursor:pointer}
.quiz-opt:hover{background:var(--accent)}

/* AI RES */
#ai-output{line-height:1.6;white-space:pre-wrap;font-size:14px;border-left:4px solid var(--accent);padding-left:15px}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">Study<span>Flow</span> v8</div>
    <div id="status-bar" style="font-size:12px; color:var(--text2)">✨ 知識レベル: <span id="star-count">0</span> Stars</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('galaxy')">🌌 知識銀河</button>
    <button class="tab" onclick="switchTab('study')">📚 演習</button>
    <button class="tab" onclick="switchTab('add')">➕ 知識追加</button>
    <button class="tab" onclick="switchTab('ai')">🤖 AI生成</button>
  </div>

  <!-- GALAXY PANEL -->
  <div class="panel active" id="panel-galaxy">
    <div class="galaxy-wrap">
      <svg id="galaxy-svg"></svg>
      <div class="galaxy-info" id="galaxy-info"></div>
    </div>
    <div style="font-size:12px; color:var(--text2); text-align:center">ノードをドラッグして移動、クリックで詳細を確認できます。</div>
  </div>

  <!-- STUDY PANEL -->
  <div class="panel" id="panel-study">
    <div class="study-modes">
      <button class="mode-btn active" onclick="setMode('fc',this)">🃏 フラッシュカード</button>
      <button class="mode-btn" onclick="setMode('quiz',this)">📝 多肢選択</button>
      <button class="mode-btn" onclick="setMode('fill',this)">✏️ 穴埋め</button>
    </div>
    <div id="subj-chips" style="display:flex; gap:8px; margin-bottom:15px; overflow-x:auto"></div>
    <div id="study-content"></div>
  </div>

  <!-- ADD KNOWLEDGE PANEL -->
  <div class="panel" id="panel-add">
    <div class="card">
      <div class="stitle">英単語・知識を手動で追加</div>
      <div class="input-group">
        <input type="text" id="new-q" placeholder="単語または問題 (例: Persistence)">
        <select id="new-cat" style="flex:0.3">
          <option value="en">英語</option><option value="la">数学</option><option value="cs">CS専門</option>
        </select>
      </div>
      <textarea id="new-a" placeholder="意味または答え (例: 粘り強さ、永続性)" rows="3" style="width:100%; box-sizing:border-box; margin-bottom:10px;"></textarea>
      <button class="primary" onclick="addNewKnowledge()">銀河に追加</button>
    </div>
    <div id="user-list" style="font-size:13px; color:var(--text2)"></div>
  </div>

  <!-- AI PANEL -->
  <div class="panel" id="panel-ai">
    <div class="card">
      <input type="password" id="api-key" placeholder="Gemini API Key" value="AIzaSyBBHbcxQpK_BAsNbRYcmr0ijwgEyQP6_eU" style="width:100%; margin-bottom:10px;">
      <div class="input-group">
        <select id="ai-subj"><option value="数学">数学</option><option value="CS専門">CS専門</option><option value="TOEIC">TOEIC英語</option></select>
        <button class="primary" onclick="askGemini()">AI類題を生成</button>
      </div>
      <div id="ai-output" class="card" style="display:none"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DATABASE & INITIAL DATA
══════════════════════════════════════ */
const SUBJECTS = {
  la: {name:'線形代数', color:'#7C5FD4'},
  ca: {name:'微積分', color:'#167A50'},
  ml: {name:'機械学習', color:'#145898'},
  en: {name:'英語', color:'#B21B7E'},
  cs: {name:'CS専門', color:'#7A5200'}
};

// 知識ベース (デフォルト)
let KNOWLEDGE = JSON.parse(localStorage.getItem('study_v8_data')) || [
  {cat:'la', q:'固有値(Eigenvalue)の定義', a:'Av = λv を満たすスカラー λ', tag:'行列'},
  {cat:'la', q:'Rank(A)=n のとき A は?', a:'正則行列（逆行列が存在する）', tag:'行列'},
  {cat:'cs', q:'プロセスとスレッドの違い', a:'プロセスは独立したメモリ空間、スレッドはメモリを共有', tag:'OS'},
  {cat:'cs', q:'TCPとUDPの違い', a:'TCPは信頼性重視(確認応答あり)、UDPは速度重視(垂れ流し)', tag:'NW'},
  {cat:'en', q:'Incur', a:'(負債などを)負う、(怒りなどを)招く', tag:'TOEIC'},
  {cat:'en', q:'Prerequisite', a:'必須条件、あらかじめ必要な', tag:'Academic'}
];

// 演習問題 (デフォルト)
const QUIZ_DATA = [
  {cat:'la', q:'det(A)=0 のとき正しいのは？', o:['逆行列がある','ランクが最大','特異行列である','固有値に0を含まない'], a:2},
  {cat:'cs', q:'二分探索の最悪計算量は？', o:['O(n)','O(log n)','O(n log n)','O(1)'], a:1}
];

/* ══════════════════════════════════════
   APP STATE
══════════════════════════════════════ */
let currentMode = 'fc';
let currentSubj = 'en';
let studyIdx = 0;
let isFlipped = false;

/* ══════════════════════════════════════
   GALAXY (D3.JS SYSTEM)
══════════════════════════════════════ */
function initGalaxy() {
  const width = document.getElementById('galaxy-wrap')?.clientWidth || 800;
  const nodes = [{id:'YOU', group:'center', r:18}];
  const links = [];

  // 知識データをノードに変換
  Object.keys(SUBJECTS).forEach(s => {
    nodes.push({id: SUBJECTS[s].name, group: s, r:12});
    links.push({source:'YOU', target: SUBJECTS[s].name});
  });

  KNOWLEDGE.forEach((k, i) => {
    const nodeID = `k${i}`;
    nodes.push({id: nodeID, group: k.cat, r:5, label: k.q, detail: k.a});
    links.push({source: SUBJECTS[k.cat].name, target: nodeID});
  });

  const svg = d3.select("#galaxy-svg");
  svg.selectAll("*").remove();
  const g = svg.append("g");

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(50))
    .force("charge", d3.forceManyBody().strength(-100))
    .force("center", d3.forceCenter(width / 2, 250));

  const link = g.append("g").selectAll("line").data(links).join("line").attr("stroke", "#2A2845");
  const node = g.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("r", d => d.r)
    .attr("fill", d => SUBJECTS[d.group]?.color || "#fff")
    .attr("stroke", "#fff").attr("stroke-width", d => d.id==='YOU'?2:0)
    .call(d3.drag().on("start", (e,d)=>{ if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
    .on("end", (e,d)=>{ if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on("click", (e, d) => {
      if(d.detail) {
        const info = document.getElementById('galaxy-info');
        info.style.display = 'block';
        info.innerHTML = `<div style="color:var(--accent); font-weight:bold">${d.label}</div><hr style="border:0; border-top:1px solid #333; margin:8px 0">${d.detail}`;
      }
    });

  const labels = g.append("g").selectAll("text").data(nodes.filter(n => n.r > 8)).join("text")
    .text(d => d.id === 'YOU' ? 'MY GALAXY' : d.id)
    .attr("fill", "#fff").attr("font-size", "10px").attr("dx", 15).attr("dy", 5);

  simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    labels.attr("x", d => d.x).attr("y", d => d.y);
  });
  
  document.getElementById('star-count').innerText = KNOWLEDGE.length;
}

/* ══════════════════════════════════════
   STUDY LOGIC
══════════════════════════════════════ */
function renderStudy() {
  const content = document.getElementById('study-content');
  const subjData = KNOWLEDGE.filter(k => k.cat === currentSubj);
  const quizData = QUIZ_DATA.filter(k => k.cat === currentSubj);

  if(currentMode === 'fc') {
    const item = subjData[studyIdx];
    if(!item) { content.innerHTML = "この教科のカードはありません。"; return; }
    content.innerHTML = `
      <div class="fc-card ${isFlipped?'flipped':''}" onclick="flip()">
        ${isFlipped ? item.a : item.q}
      </div>
      <div style="display:flex; justify-content:center; gap:10px; margin-top:15px">
        <button class="mode-btn" onclick="moveStudy(-1)">← 前へ</button>
        <button class="mode-btn" onclick="moveStudy(1)">次へ →</button>
      </div>
    `;
  } else if(currentMode === 'quiz') {
    const q = quizData[0]; // 簡易実装のため1問目のみ
    if(!q) { content.innerHTML = "クイズデータがありません。"; return; }
    content.innerHTML = `
      <div class="card">
        <div class="stitle">多肢選択問題</div>
        <div>${q.q}</div>
        ${q.o.map((opt, i) => `<button class="quiz-opt" onclick="checkAns(${i}, ${q.a})">${opt}</button>`).join('')}
      </div>
    `;
  } else {
    content.innerHTML = `<div class="card">穴埋めモード：${subjData[0]?.q} の答えを入力してください。<br><input type="text" id="fill-ans" style="margin-top:10px"><button class="primary" onclick="checkFill('${subjData[0]?.a}')">回答</button></div>`;
  }
}

window.flip = () => { isFlipped = !isFlipped; renderStudy(); };
window.moveStudy = (d) => {
  const subjData = KNOWLEDGE.filter(k => k.cat === currentSubj);
  studyIdx = (studyIdx + d + subjData.length) % subjData.length;
  isFlipped = false;
  renderStudy();
};
window.checkAns = (i, a) => { alert(i === a ? "正解！" : "不正解..."); };
window.checkFill = (a) => {
  const val = document.getElementById('fill-ans').value;
  alert(val === a ? "正解！" : `不正解... 正解は: ${a}`);
};

/* ══════════════════════════════════════
   USER ADD KNOWLEDGE
══════════════════════════════════════ */
window.addNewKnowledge = () => {
  const q = document.getElementById('new-q').value;
  const a = document.getElementById('new-a').value;
  const cat = document.getElementById('new-cat').value;
  if(!q || !a) return alert("入力してください");
  
  KNOWLEDGE.push({cat, q, a, tag:'UserAdded'});
  localStorage.setItem('study_v8_data', JSON.stringify(KNOWLEDGE));
  
  document.getElementById('new-q').value = '';
  document.getElementById('new-a').value = '';
  alert("銀河に新しい知識が追加されました！");
  initGalaxy();
};

/* ══════════════════════════════════════
   AI GENERATION (FIXED)
══════════════════════════════════════ */
async function askGemini() {
  const key = document.getElementById('api-key').value;
  const subj = document.getElementById('ai-subj').value;
  const output = document.getElementById('ai-output');
  
  output.style.display = 'block';
  output.innerText = "思考中...";

  const prompt = `あなたは大学院入試(数学・CS)とTOEICの専門講師です。${subj}に関する院試レベルの類題を1問作成し、その次に「解答：」として答えを書いてください。`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    
    // エラーハンドリングの強化
    if(data.error) {
      throw new Error(data.error.message);
    }
    
    if(!data.candidates || data.candidates.length === 0) {
      throw new Error("AIが回答を生成できませんでした（安全フィルター等）。プロンプトを変えてみてください。");
    }

    const txt = data.candidates[0].content.parts[0].text;
    output.innerText = txt;
  } catch (e) {
    output.innerText = "エラーが発生しました:\n" + e.message;
  }
}

/* ══════════════════════════════════════
   SYSTEM
══════════════════════════════════════ */
function switchTab(t) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
  event.currentTarget.classList.add('active');
  if(t === 'galaxy') initGalaxy();
  if(t === 'study') renderStudy();
}

function setMode(m, el) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderStudy();
}

function init() {
  const chips = document.getElementById('subj-chips');
  chips.innerHTML = Object.keys(SUBJECTS).map(k => `
    <button class="mode-btn" onclick="currentSubj='${k}'; studyIdx=0; renderStudy()">${SUBJECTS[k].name}</button>
  `).join('');
  initGalaxy();
  renderStudy();
}

init();
</script>
</body>
</html>
