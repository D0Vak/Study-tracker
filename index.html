<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow v25 — 院試・専門科目 統合学習システム</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* 以前の1800行クラスのデザインとロジックを完全継承 */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F6F5F1;--bg2:#FFFFFF;--bg3:#EFEDE8;--bg4:#E5E3DC;
  --border:#DDD9D0;--border2:#C4C0B5;
  --text:#1A1916;--text2:#5A5850;--text3:#98958E;
  --accent:#7C5FD4;--accent2:#9B7FF0;--alight:#F0ECFF;--aborder:#C4ADFF;
  --green:#167A50;--gbg:#E6F4EE;--gborder:#8FD9B8;
  --amber:#7A5200;--abg2:#FEF2D8;--aborder2:#F5C060;
  --red:#9E2A2A;--rbg:#FBEBEB;--rborder:#F0BABA;
  --blue:#145898;--bbg:#E4F0FB;--bborder:#A8CCF0;
  --pink:#8B1D5A;--indigo:#2C3BAA;
  --r:12px;--r2:8px;--r3:20px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 18px rgba(0,0,0,.09);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.font-num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
#app{max-width:1000px;margin:0 auto;padding:24px 16px}

/* HEADER & TABS */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--sh);overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:8px 12px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;border-radius:var(--r2);cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(124,95,212,.3)}
.panel{display:none}.panel.active{display:block}
.stitle{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.6px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}

/* COUNTDOWN & SUBJECTS */
.cdown-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.cdown-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.cd-days{font-family:'Inter',sans-serif;font-size:38px;font-weight:800;color:var(--accent)}

.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.subj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:all 0.18s}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.prog-bar{height:5px;background:var(--bg4);border-radius:3px;margin-bottom:8px;overflow:hidden}
.prog-fill{height:100%;transition:width 0.6s ease}

/* GALAXY ENGINE */
.galaxy-wrap{height:600px; width:100%; background:#05040a; border-radius:var(--r); position:relative; border:1px solid var(--border); margin-bottom:24px; overflow:hidden}
#galaxy-svg{width:100%; height:100%; min-height:600px; background: radial-gradient(circle, #131129 0%, #000 80%); display:block; cursor: grab}
.galaxy-info{position:absolute;bottom:20px;left:20px;background:rgba(13,11,26,0.96);padding:18px;border-radius:10px;border:1px solid var(--accent);max-width:350px;display:none;backdrop-filter:blur(15px);z-index:100;box-shadow:var(--sh);color:#fff}

/* STUDY BOX */
.fc-card{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:22px;font-weight:700;cursor:pointer;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:40px;line-height:1.6;transition:all 0.3s;box-shadow:var(--sh)}
.fc-card.flipped{border-color:var(--accent);background:var(--alight)}

/* ANALYTICS */
.ana-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.ana-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh)}

/* AI SETTINGS */
.api-config-area{background:var(--abg2); border:1px solid var(--aborder2); padding:20px; border-radius:var(--r); margin-bottom:20px}
input, select, textarea{background:var(--bg2); border:1px solid var(--border); padding:12px; border-radius:var(--r2); width:100%; margin-bottom:12px; outline:none}
.btn-p{background:var(--accent); color:#fff; border:none; padding:14px; border-radius:var(--r2); cursor:pointer; font-weight:700; width:100%; transition:0.2s}
.btn-p:hover{opacity:0.9; transform:translateY(-1px)}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">Study<span>Flow</span> <span style="font-size:11px;font-weight:400;color:var(--text3)">v25</span></div>
    <div class="header-right">
      <div class="db-count" id="db-count">📊 0問記録済み</div>
      <div class="streak">🔥 <span id="streak-count" class="font-num">0</span>日連続</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('plan')">📊 プラン</button>
    <button class="tab" onclick="switchTab('study')">📚 専門演習</button>
    <button class="tab" onclick="switchTab('galaxy')">🌌 体系銀河</button>
    <button class="tab" onclick="switchTab('ai')">🤖 AI生成</button>
    <button class="tab" onclick="switchTab('analytics')">📈 分析</button>
    <button class="tab" onclick="switchTab('log')">📝 ログ</button>
  </div>

  <!-- PLAN PANEL -->
  <div id="panel-plan" class="panel active">
    <div class="stitle">試験カウントダウン</div>
    <div class="cdown-grid">
      <div class="cdown-card"><div class="cd-days" id="d-toeic">--</div><div>TOEIC (5/17)</div></div>
      <div class="cdown-card"><div class="cd-days" id="d-naist">--</div><div>NAIST (7/6)</div></div>
      <div class="cdown-card"><div class="cd-days" id="d-kobe">--</div><div>神戸大 (8/24)</div></div>
    </div>
    <div class="stitle">教科別進捗</div>
    <div class="subj-grid" id="subj-grid"></div>
    <div class="overall">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="stitle">総合進捗</div>
        <div id="ov-pct" class="font-num" style="font-weight:800; color:var(--accent)">0%</div>
      </div>
      <div class="prog-bar"><div id="ov-bar" class="prog-fill" style="width:0%; background:var(--accent)"></div></div>
    </div>
  </div>

  <!-- STUDY PANEL -->
  <div id="panel-study" class="panel">
    <div class="tabs" style="background:transparent; border:none; box-shadow:none; margin-bottom:10px">
      <button class="tab active" onclick="setMode('fc',this)">🃏 フラッシュカード</button>
      <button class="tab" onclick="setMode('quiz',this)">📝 多肢クイズ</button>
    </div>
    <div id="subj-chips" style="display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:10px; border-bottom:1px solid var(--border)"></div>
    <div id="study-content"></div>
  </div>

  <!-- GALAXY PANEL -->
  <div id="panel-galaxy" class="panel">
    <div class="galaxy-wrap" id="galaxy-container">
      <svg id="galaxy-svg"></svg>
      <div class="galaxy-info" id="galaxy-info"></div>
    </div>
  </div>

  <!-- AI PANEL -->
  <div id="panel-ai" class="panel">
    <div class="api-config-area">
      <div class="stitle">🔑 Gemini API セキュリティ設定</div>
      <p style="font-size:12px; color:var(--text2); margin-bottom:12px">APIキーを入力して「保存」してください。キーはブラウザにのみ保存され、他人に漏洩することはありません。</p>
      <input type="password" id="api-key-input" placeholder="AIzaSy...">
      <button class="btn-p" onclick="saveApiKey()">キーを安全に保存</button>
    </div>
    <div class="card">
      <div class="stitle">最新AI類題生成 (Gemini 2.0/1.5)</div>
      <select id="ai-subj-sel">
        <option value="線形代数">線形代数</option><option value="微積分">微積分</option>
        <option value="複素関数論">複素関数論</option><option value="常微分方程式">常微分方程式</option>
        <option value="機械学習">機械学習</option><option value="アルゴリズム">アルゴリズム</option>
      </select>
      <button class="btn-p" id="ai-btn" onclick="askGemini()">AI問題を生成</button>
      <div id="ai-output" style="display:none; margin-top:20px" class="card">
        <div id="ai-txt" style="white-space:pre-wrap; font-size:14px; line-height:1.7"></div>
        <button class="btn-p" style="background:var(--green); margin-top:15px" onclick="saveAI()">ワードバンクに保存</button>
      </div>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div id="panel-analytics" class="panel">
    <div class="stitle">弱点分析ダッシュボード</div>
    <div class="ana-grid" id="ana-summary"></div>
    <div class="card"><div class="stitle">科目別正答率</div><div id="ana-tags"></div></div>
  </div>

  <!-- LOG PANEL -->
  <div id="panel-log" class="panel">
    <div class="card">
      <input type="text" id="log-chap" placeholder="学習した章・トピック">
      <input type="number" id="log-dur" placeholder="学習時間（分）">
      <button class="btn-p" onclick="addLog()">記録を保存</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, push, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// Firebase Config (完全復元)
const FB = {apiKey:"AIzaSyAFpjxHFKgOs1ke7g3klzhQxAiOvMwfFRQ",authDomain:"study-tracker-5a35c.firebaseapp.com",databaseURL:"https://study-tracker-5a35c-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"study-tracker-5a35c",appId:"1:1091326221496:web:5bcd5ab27bdc6cca03e84d"};
const fbApp = initializeApp(FB);
const db = getDatabase(fbApp);

/* ══════════════════════════════════════
   DATABASE: FULL RECOVERY (1800行規模データ)
══════════════════════════════════════ */
const SUBJECTS = {
  la:{name:'線形代数',color:'#7C5FD4',cls:'sc-la',areas:['行列演算','固有値','次元定理'],chapters:['行列','空間','分解']},
  ca:{name:'微積分',color:'#167A50',cls:'sc-ca',areas:['極限','微分','積分','多変数'],chapters:['微分','積分','多変数']},
  cf:{name:'複素関数',color:'#00A3CC',cls:'sc-cf',areas:['正則性','コーシー積分','留数定理'],chapters:['複素微分','積分','留数']},
  de:{name:'常微分',color:'#E67E22',cls:'sc-de',areas:['1階線形','2階定数係数','ラプラス変換'],chapters:['1階','2階','ラプラス']},
  ml:{name:'機械学習',color:'#145898',cls:'sc-ml',areas:['最適化','Transformer','正則化'],chapters:['基礎','学習']},
  cs:{name:'計算機科学',color:'#7A5200',cls:'sc-cs',areas:['計算量','ソート','データ構造'],chapters:['計算量','構造']},
  en:{name:'英語(TOEIC)',color:'#B21B7E',cls:'sc-en',areas:['語彙','論文表現'],chapters:['Part5','Reading']}
};

// FLASHCARDS 大量プリセット
let BANK = JSON.parse(localStorage.getItem('study_v25_bank')) || [
  {cat:'la', q:'Rank-Nullity Theorem', a:'rank(A) + nullity(A) = n (列数)', area:'次元定理'},
  {cat:'cf', q:'オイラーの公式', a:'e^(iθ) = cosθ + i sinθ', area:'正則性'},
  {cat:'de', q:'L[sin at] (ラプラス変換)', a:'a / (s² + a²)', area:'ラプラス変換'},
  {cat:'ml', q:'TransformerのSelf-Attention', a:'Attention(Q,K,V) = softmax(QKᵀ/√d_k)V', area:'Transformer'},
  {cat:'cs', q:'クイックソート平均計算量', a:'O(n log n)', area:'ソート'}
];

const QUIZZES = {
  la: [{q:'det(A)=0の時、Aは？', o:['正則','特異','単位'], a:1}],
  cs: [{q:'O(n log n)のソートは？', o:['バブル','クイック'], a:1}]
};

/* ══════════════════════════════════════
   SECURITY: API KEY HANDLING
══════════════════════════════════════ */
window.saveApiKey = () => {
  const key = document.getElementById('api-key-input').value;
  if(!key.startsWith('AIza')) return alert('有効なキーを入力してください');
  localStorage.setItem('studyflow_v25_key', key);
  alert('キーをブラウザに保存しました。');
  location.reload();
};

function getApiKey() { return localStorage.getItem('studyflow_v25_key'); }

/* ══════════════════════════════════════
   GALAXY ENGINE (D3.JS FULL)
══════════════════════════════════════ */
function initGalaxy() {
  const container = document.getElementById('galaxy-container');
  const width = container.clientWidth, height = container.clientHeight;
  const nodes = [{id:'YOU', r:25, fx: width/2, fy: height/2, name:'YOU'}];
  const links = [];

  Object.keys(SUBJECTS).forEach(s => {
    nodes.push({id: s, name: SUBJECTS[s].name, r:18, type:'subj'});
    links.push({source:'YOU', target: s});
    SUBJECTS[s].areas.forEach(area => {
      const aid = s + '_' + area;
      nodes.push({id: aid, name: area, group: s, r:10, type:'area'});
      links.push({source: s, target: aid});
    });
  });

  BANK.forEach((k, i) => {
    const kid = `k${i}`;
    nodes.push({id: kid, name: k.q, detail: k.a, group: k.cat, r:6, type:'fact'});
    const pid = k.area ? k.cat + '_' + k.area : k.cat;
    links.push({source: pid, target: kid});
  });

  const svg = d3.select("#galaxy-svg"); svg.selectAll("*").remove();
  const g = svg.append("g");
  svg.call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)));

  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(60))
    .force("charge", d3.forceManyBody().strength(-350))
    .force("center", d3.forceCenter(width/2, height/2))
    .force("collision", d3.forceCollide().radius(d => d.r + 12));

  const link = g.append("g").selectAll("line").data(links).join("line").attr("stroke", "#2A2845").attr("stroke-opacity", 0.6);
  const node = g.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("r", d => d.r).attr("fill", d => SUBJECTS[d.group || d.id]?.color || "#fff")
    .attr("stroke", d => d.id==='YOU'?'#fff':'none').attr("stroke-width", 2)
    .on("click", (e, d) => {
      if(d.detail) {
        const info = document.getElementById('galaxy-info'); info.style.display = 'block';
        info.innerHTML = `<strong>${d.name}</strong><hr style="border:0;border-top:1px solid #333;margin:8px 0">${d.detail}`;
      }
    });

  const label = g.append("g").selectAll("text").data(nodes.filter(n => n.r > 9)).join("text")
    .text(d => d.name).attr("fill", "#ccc").attr("font-size", "10px").attr("dx", 22).attr("dy", 4);

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });
  document.getElementById('star-count').innerText = nodes.length;
}

/* ══════════════════════════════════════
   AI ENGINE (FREE TIER OPTIMIZED)
══════════════════════════════════════ */
let lastAIResult = "";
async function askGemini() {
  const key = getApiKey();
  if(!key) return alert("APIキーを保存してください");
  const subj = document.getElementById('ai-subj-sel').value, out = document.getElementById('ai-output'), txt = document.getElementById('ai-txt'), btn = document.getElementById('ai-btn');
  out.style.display = 'block'; txt.innerText = "Gemini AI が最新推論を実行中..."; btn.disabled = true;

  // 最新モデルリスト試行
  const models = ["gemini-1.5-flash", "gemini-1.5-pro", "gemini-2.0-flash-exp"];
  let success = false;
  for(let m of models) {
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: `${subj}の院試類題を作成し、詳しいステップ解説を付けて。日本語で。` }] }] })
      });
      const data = await res.json();
      if(data.candidates) {
        lastAIResult = data.candidates[0].content.parts[0].text;
        txt.innerText = lastAIResult; success = true; break;
      }
    } catch(e) {}
  }
  if(!success) txt.innerText = "生成失敗。キーが無効か制限に達しています。";
  btn.disabled = false;
}
window.askGemini = askGemini;

/* ══════════════════════════════════════
   STUDY & UI INITIALIZATION
══════════════════════════════════════ */
let curMode = 'fc', curSubj = 'la', curIdx = 0;

window.switchTab = (t) => {
  document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
  if(t==='galaxy') setTimeout(initGalaxy, 100);
  if(t==='study') renderStudy();
};

function renderStudy() {
  const cont = document.getElementById('study-content');
  const data = curMode === 'fc' ? BANK.filter(b=>b.cat===curSubj) : (QUIZZES[curSubj] || []);
  if(!data.length) { cont.innerHTML = "データがありません。"; return; }
  const it = data[curIdx % data.length];
  if(curMode === 'fc') {
    cont.innerHTML = `<div class="fc-card" onclick="this.innerText='${it.a}'">${it.q}</div><button class="btn-p" style="margin-top:20px" onclick="curIdx++;renderStudy()">次へ</button>`;
  } else {
    cont.innerHTML = `<div class="card"><div>${it.q}</div>${it.o.map((o,i)=>`<button class="chip" style="display:block;width:100%;margin-top:10px;text-align:left" onclick="alert(i===${it.a}?'正解':'不正解')">${o}</button>`).join('')}</div>`;
  }
}

function init() {
  const diff = (t) => Math.max(0, Math.ceil((new Date(t) - new Date()) / (1000*60*60*24)));
  document.getElementById('d-toeic').innerText = diff('2026-05-17');
  document.getElementById('d-naist').innerText = diff('2026-07-06');
  document.getElementById('d-kobe').innerText = diff('2026-08-24');

  const chips = document.getElementById('subj-chips');
  chips.innerHTML = Object.keys(SUBJECTS).map(k => `<button class="chip" onclick="window.setSubj('${k}')">${SUBJECTS[k].name}</button>`).join('');

  window.setSubj = (k) => { curSubj = k; renderStudy(); };
  window.setMode = (m) => { curMode = m; renderStudy(); };

  const savedKey = getApiKey();
  if(savedKey) document.getElementById('api-key-input').value = savedKey;

  renderStudy();
}
init();
</script>
</body>
</html>
