<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>院試・TOEIC 学習トラッカー</title>
<style>
:root {
  --bg:#fafaf8;--bg2:#f2f0ea;--bg3:#e8e6df;--card:#fff;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --green:#3b6d11;--green-bg:#eaf3de;
  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
  --purple:#3c3489;--purple-bg:#eeedfe;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
/* フラッシュカード用スタイル */
.card-answer { display: none; padding-top: 10px; margin-top: 10px; border-top: 0.5px solid var(--border); }
.subj-card.flipped .card-answer { display: block; }
#knowledge-input-area input, #knowledge-input-area textarea {
  width: 100%; margin-bottom: 8px; padding: 10px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-family: inherit;
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#141412;--bg2:#1e1e1c;--bg3:#2a2a28;--card:#1e1e1c;
    --text:#e8e6df;--text2:#b4b2a9;--text3:#888780;
    --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.18);
    --blue:#85b7eb;--blue-bg:#0c447c;
    --green:#c0dd97;--green-bg:#27500a;
    --amber:#fac775;--amber-bg:#633806;
    --red:#f09595;--red-bg:#791f1f;
    --purple:#afa9ec;--purple-bg:#2a2460;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* ── SETUP SCREEN ── */
#setup-screen{display:none;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:3rem 1rem}
.setup-card{background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius);padding:2rem;max-width:560px;width:100%;box-shadow:var(--shadow)}
.setup-title{font-size:17px;font-weight:500;margin-bottom:.4rem}
.setup-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}
.setup-input{width:100%;font-family:monospace;font-size:12px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);resize:vertical;margin-top:.8rem;min-height:120px}
.btn{font-size:12px;padding:8px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue-bg);color:var(--blue);border-color:transparent; font-weight: 600;}

/* ── MAIN UI ── */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin:1.5rem 0 .6rem;letter-spacing: .05em;}

.cd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cd-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.cd-days{font-size:26px;font-weight:500;}

.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.subj-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow); transition: transform 0.1s;}
.subj-card:active{transform: scale(0.98);}
.level-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:10px 0 4px}
.level-fill{height:100%;transition:width .3s}

.phase-tabs{display:flex;margin-bottom:10px;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border2)}
.phase-tab{flex:1;padding:9px 6px;background:var(--bg2);cursor:pointer;font-size:12px;text-align:center;border-right:0.5px solid var(--border2)}
.phase-tab.active{background:var(--card);font-weight:600;}
.task-list{display:flex;flex-direction:column;gap:4px}
.task-item{display:flex;gap:10px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;box-shadow:var(--shadow); cursor: pointer;}
.task-item.done{opacity: 0.5;}

.log-form{display:flex;gap:8px;margin-bottom:10px}
.log-input{flex:1;padding:8px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--card);color:var(--text);}
.log-list{display:flex;flex-direction:column;gap:5px;}
.log-item{background:var(--card);border:0.5px solid var(--border);padding:10px;border-radius:var(--radius-sm);display:flex;justify-content:space-between;}

@media(max-width:560px){
  .cd-grid{grid-template-columns:repeat(2,1fr)}
  .subj-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-title">🔧 Firebase 接続</div>
    <textarea class="setup-input" id="fb-config-input" placeholder='Configを貼り付け'></textarea>
    <button class="btn btn-primary" onclick="saveConfig()" style="margin-top:10px; width:100%">保存して開始</button>
  </div>
</div>

<div id="main-screen" style="display:none">
  <div class="app">
    <header>
      <div>
        <h1 style="font-size:18px;">院試・TOEIC Tracker</h1>
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">接続中...</span></div>
      </div>
      <button class="btn" onclick="showSetup()">⚙設定</button>
    </header>

    <div class="section-label">試験まで</div>
    <div class="cd-grid" id="countdown"></div>

    <div class="section-label">科目別進捗</div>
    <div class="subj-grid" id="subjects"></div>

    <div class="section-label">フェーズ別タスク</div>
    <div class="phase-tabs" id="phase-tabs"></div>
    <div class="task-list" id="task-list"></div>

    <div class="section-label">🧠 院試ナレッジベース（暗記カード）</div>
    <div id="knowledge-input-area">
      <input type="text" id="card-subject" placeholder="科目 (例: 線形代数)">
      <input type="text" id="card-term" placeholder="用語・公式名">
      <textarea id="card-concept" rows="2" placeholder="直感的な理解を一言で"></textarea>
      <button onclick="addKnowledgeCard()" class="btn btn-primary" style="width:100%">知識を保存</button>
    </div>
    <div id="knowledge-list" style="margin-top:15px;"></div>

    <div class="section-label">学習ログ</div>
    <div class="log-form">
      <input class="log-input" id="log-input" type="text" placeholder="今日やったこと">
      <button class="btn btn-primary" onclick="addLog()">追加</button>
    </div>
    <div class="log-list" id="log-list"></div>

    <div style="margin-top:30px; text-align:center;">
      <button class="btn" onclick="resetAll()" style="color:var(--red)">全データリセット</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- DATA ---
const EXAMS = [
  { name:'TOEIC', date:'2026-05-17', color:'var(--amber)' },
  { name:'NAIST', date:'2026-07-01', color:'var(--blue)' },
  { name:'神戸大', date:'2026-08-28', color:'var(--red)' }
];
const SUBJECTS = [
  { id:'linear', name:'線形代数', color:'var(--green)' },
  { id:'calc', name:'微積分', color:'var(--green)' },
  { id:'algo', name:'アルゴリズム', color:'var(--amber)' }
];
const PHASES = [
  { id:'p1', name:'〜5/17', tasks:[{id:'t1', title:'TOEIC単語', sub:'金フレ'}] },
  { id:'p2', name:'〜6/末', tasks:[{id:'t2', title:'数学演習', sub:'基礎'}] }
];

// --- STATE ---
let dbRef = null;
let state = {
  subjects: {}, tasks: {}, logs: [], notes: {},
  activePhase: 'p1', knowledgeCards: []
};

// --- CORE FUNCTIONS ---
function initFirebase(cfg) {
  try {
    const app = firebase.initializeApp(cfg);
    dbRef = firebase.database(app).ref('tracker_v2');
    dbRef.on('value', snap => {
      const data = snap.val();
      if(data) {
        state = {...state, ...data};
        // 配列が消えないように保護
        if(!state.knowledgeCards) state.knowledgeCards = [];
        if(!state.logs) state.logs = [];
      }
      render();
      setSyncStatus('ok', '同期済み');
    });
    showMain();
  } catch(e) { console.error(e); showSetup(); }
}

function pushState() {
  if(!dbRef) return;
  setSyncStatus('syncing', '保存中...');
  dbRef.set(state);
}

function render() {
  renderCountdown();
  renderSubjects();
  renderTasks();
  renderLogs();
  renderKnowledge();
}

// --- RENDERERS ---
function renderCountdown() {
  const now = new Date();
  document.getElementById('countdown').innerHTML = EXAMS.map(e => {
    const diff = Math.max(0, Math.ceil((new Date(e.date) - now)/86400000));
    return `<div class="cd-card"><div class="cd-days" style="color:${e.color}">${diff}</div><div style="font-size:10px;">${e.name}</div></div>`;
  }).join('');
}

function renderSubjects() {
  document.getElementById('subjects').innerHTML = SUBJECTS.map(s => {
    const p = state.subjects[s.id] || 0;
    return `<div class="subj-card">
      <div style="font-size:13px; font-weight:600;">${s.name}</div>
      <div class="level-bar"><div class="level-fill" style="width:${p}%; background:${s.color}"></div></div>
      <input type="range" style="width:100%" value="${p}" onchange="saveSubj('${s.id}', this.value)">
    </div>`;
  }).join('');
}

function renderTasks() {
  const p = PHASES.find(x => x.id === state.activePhase) || PHASES[0];
  document.getElementById('phase-tabs').innerHTML = PHASES.map(x => 
    `<div class="phase-tab ${state.activePhase===x.id?'active':''}" onclick="state.activePhase='${x.id}';render();pushState();">${x.name}</div>`
  ).join('');
  document.getElementById('task-list').innerHTML = p.tasks.map(t => 
    `<div class="task-item ${state.tasks[t.id]?'done':''}" onclick="toggleTask('${t.id}')">
      <div style="font-size:13px;">${t.title}</div>
    </div>`
  ).join('');
}

function renderKnowledge() {
  const list = document.getElementById('knowledge-list');
  if(!state.knowledgeCards || state.knowledgeCards.length === 0) {
    list.innerHTML = '<div style="text-align:center; color:var(--text3); font-size:12px;">カードはまだありません</div>';
    return;
  }
  list.innerHTML = state.knowledgeCards.map((c, i) => `
    <div class="subj-card" onclick="this.classList.toggle('flipped')" style="cursor:pointer; margin-bottom:8px;">
      <div style="font-size:10px; color:var(--text3)">${escHtml(c.subject)}</div>
      <div style="font-size:15px; font-weight:600;">${escHtml(c.term)}</div>
      <div class="card-answer">
        <div style="font-size:13px; color:var(--blue)">💡 理解の核:</div>
        <div style="font-size:13px;">${escHtml(c.concept)}</div>
        <button class="btn" style="margin-top:10px; color:var(--red); border:none; padding:0;" onclick="deleteCard(${i}); event.stopPropagation();">削除</button>
      </div>
    </div>
  `).join('');
}

function renderLogs() {
  document.getElementById('log-list').innerHTML = (state.logs || []).slice().reverse().map((l, i) => 
    `<div class="log-item"><div style="font-size:13px;">${escHtml(l.text)}</div></div>`
  ).join('');
}

// --- ACTIONS ---
function saveSubj(id, val) { state.subjects[id] = val; pushState(); render(); }
function toggleTask(id) { state.tasks[id] = !state.tasks[id]; pushState(); render(); }
function addLog() {
  const val = document.getElementById('log-input').value;
  if(!val) return;
  state.logs.push({text: val, date: new Date().toISOString()});
  document.getElementById('log-input').value = '';
  pushState(); render();
}
function addKnowledgeCard() {
  const sub = document.getElementById('card-subject').value || '共通';
  const term = document.getElementById('card-term').value;
  const concept = document.getElementById('card-concept').value;
  if(!term || !concept) return alert('入力してください');
  state.knowledgeCards.push({subject: sub, term, concept});
  document.getElementById('card-term').value = '';
  document.getElementById('card-concept').value = '';
  pushState(); render();
}
function deleteCard(i) { if(confirm('削除しますか？')) { state.knowledgeCards.splice(i,1); pushState(); render(); } }

// --- HELPERS ---
function setSyncStatus(type, msg) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot ' + (type === 'syncing' ? 'syncing' : '');
  document.getElementById('sync-label').innerText = msg;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function showMain() { document.getElementById('setup-screen').style.display='none'; document.getElementById('main-screen').style.display='block'; }
function showSetup() { document.getElementById('setup-screen').style.display='flex'; document.getElementById('main-screen').style.display='none'; }
function saveConfig() {
  const cfg = {
    apiKey: "AIzaSyAFpjxHFKgOs1ke7g3klzhQxAiOvMwfFRQ",
    authDomain: "study-tracker-5a35c.firebaseapp.com",
    databaseURL: "https://study-tracker-5a35c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "study-tracker-5a35c",
    storageBucket: "study-tracker-5a35c.firebasestorage.app",
    messagingSenderId: "1091326221496",
    appId: "1:1091326221496:web:5bcd5ab27bdc6cca03e84d"
  };
  localStorage.setItem('fb_config', JSON.stringify(cfg));
  initFirebase(cfg);
}
function resetAll() { if(confirm('全消去しますか？')) { state={subjects:{}, tasks:{}, logs:[], knowledgeCards:[]}; pushState(); } }

window.onload = () => {
  const cfg = localStorage.getItem('fb_config');
  if(cfg) initFirebase(JSON.parse(cfg)); else showSetup();
};
</script>
</body>
</html>
