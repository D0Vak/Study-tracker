<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0C0C0F;--bg2:#141418;--bg3:#1C1C22;--bg4:#24242C;
    --border:#2E2E38;--border2:#3A3A48;
    --text:#F0EFF8;--text2:#9B9AB0;--text3:#6B6A80;
    --accent:#7C5FD4;--accent2:#9B7FF0;--accent3:#C4ADFF;
    --green:#2ECC8A;--green2:#1A7A54;
    --amber:#F0A830;--amber2:#7A5010;
    --red:#E85050;--blue:#4A9EF0;
    --radius:12px;--radius2:8px;--radius3:20px;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  #app{max-width:900px;margin:0 auto;padding:24px 16px}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px}
  .logo span{color:var(--accent2)}
  .header-right{display:flex;align-items:center;gap:12px}
  .streak-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius3);padding:6px 14px;font-size:13px;font-weight:500}
  .streak-fire{font-size:16px}

  .tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:28px}
  .tab{flex:1;padding:9px 12px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:var(--radius2);cursor:pointer;transition:all .2s;text-align:center}
  .tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(124,95,212,.35)}
  .tab:hover:not(.active){background:var(--bg3);color:var(--text)}

  .panel{display:none}
  .panel.active{display:block}

  /* PLAN TAB */
  .section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}

  .subjects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:28px}
  .subject-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s;position:relative;overflow:hidden}
  .subject-card:hover{border-color:var(--border2)}
  .subject-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
  .subject-card.linear-algebra::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .subject-card.calculus::before{background:linear-gradient(90deg,var(--green),#40DDAA)}
  .subject-card.ml::before{background:linear-gradient(90deg,var(--blue),#80C0FF)}
  .subject-card.prob::before{background:linear-gradient(90deg,var(--amber),#FFD080)}

  .subject-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
  .subject-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:2px}
  .subject-chapter{font-size:12px;color:var(--text3)}
  .subject-pct{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text)}

  .prog-bar{height:5px;background:var(--bg4);border-radius:3px;margin-bottom:10px;overflow:hidden}
  .prog-fill{height:100%;border-radius:3px;transition:width .6s ease}
  .linear-algebra .prog-fill{background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .calculus .prog-fill{background:linear-gradient(90deg,var(--green),#40DDAA)}
  .ml .prog-fill{background:linear-gradient(90deg,var(--blue),#80C0FF)}
  .prob .prog-fill{background:linear-gradient(90deg,var(--amber),#FFD080)}

  .subject-stats{display:flex;gap:16px}
  .stat-item{font-size:11px;color:var(--text3)}
  .stat-item strong{color:var(--text2);display:block;font-size:13px;font-weight:500}

  .quiz-btn{width:100%;margin-top:12px;padding:8px;background:transparent;border:1px solid var(--border);border-radius:var(--radius2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
  .quiz-btn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text)}

  .plan-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
  .plan-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)}
  .plan-row:last-child{border-bottom:none}
  .plan-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .plan-text{flex:1;font-size:13px}
  .plan-tag{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
  .tag-today{background:rgba(124,95,212,.2);color:var(--accent3)}
  .tag-done{background:rgba(46,204,138,.15);color:var(--green)}
  .tag-upcoming{background:var(--bg4);color:var(--text3)}
  .tag-exam{background:rgba(240,168,48,.15);color:var(--amber)}

  .exam-countdown{background:linear-gradient(135deg,rgba(124,95,212,.12),rgba(155,127,240,.06));border:1px solid rgba(124,95,212,.25);border-radius:var(--radius);padding:20px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between}
  .countdown-label{font-size:12px;color:var(--text3);margin-bottom:4px}
  .countdown-days{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--accent3);line-height:1}
  .countdown-sub{font-size:12px;color:var(--text2);margin-top:4px}
  .countdown-right{text-align:right}
  .countdown-target{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
  .countdown-date{font-size:11px;color:var(--text3);margin-top:2px}

  .overall-progress{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:28px}
  .overall-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin:12px 0 8px}
  .overall-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2),#C4A8FF);transition:width .8s ease}
  .overall-nums{display:flex;justify-content:space-between;font-size:12px;color:var(--text3)}

  /* FLASHCARD TAB */
  .fc-topics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:24px}
  .fc-topic{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
  .fc-topic:hover{border-color:var(--border2);background:var(--bg3)}
  .fc-topic.selected{border-color:var(--accent);background:rgba(124,95,212,.1)}
  .fc-topic-icon{font-size:24px;margin-bottom:8px;font-family:'Syne',sans-serif;font-weight:800;color:var(--accent2)}
  .fc-topic-name{font-size:13px;font-weight:500;margin-bottom:4px}
  .fc-topic-count{font-size:11px;color:var(--text3)}

  .fc-area{display:none}
  .fc-area.active{display:block}

  .fc-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;min-height:200px;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center;margin-bottom:16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
  .fc-card:hover{border-color:var(--border2)}
  .fc-card.flipped{background:var(--bg3);border-color:var(--accent)}
  .fc-card-hint{position:absolute;bottom:12px;right:14px;font-size:11px;color:var(--text3)}
  .fc-q{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;line-height:1.4}
  .fc-a{font-size:15px;color:var(--text2);line-height:1.7}
  .fc-tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:10px;background:rgba(124,95,212,.15);color:var(--accent3);margin-bottom:14px;font-weight:500}
  .fc-actions{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
  .fc-btn{padding:10px 20px;border-radius:var(--radius2);border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
  .fc-btn.wrong{color:#ff6b6b;border-color:rgba(232,80,80,.3)}
  .fc-btn.wrong:hover{background:rgba(232,80,80,.12)}
  .fc-btn.correct{color:var(--green);border-color:rgba(46,204,138,.3)}
  .fc-btn.correct:hover{background:rgba(46,204,138,.1)}
  .fc-btn.next{color:var(--text2);border-color:var(--border2)}
  .fc-btn.next:hover{background:var(--bg3);color:var(--text)}
  .fc-progress-line{font-size:12px;color:var(--text3);text-align:center}

  /* LOG TAB */
  .log-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-label{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;font-weight:500}
  .form-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
  .form-input:focus{border-color:var(--accent)}
  .form-input option{background:var(--bg3)}
  .form-note{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;resize:vertical;min-height:72px;transition:border-color .2s}
  .form-note:focus{border-color:var(--accent)}
  .submit-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius2);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:4px}
  .submit-btn:hover{background:var(--accent2);transform:translateY(-1px)}

  .log-list{display:flex;flex-direction:column;gap:10px}
  .log-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:14px;align-items:flex-start;transition:border-color .2s}
  .log-item:hover{border-color:var(--border2)}
  .log-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .log-content{flex:1}
  .log-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .log-subject{font-size:13px;font-weight:500}
  .log-time{font-size:11px;color:var(--text3)}
  .log-chapter{font-size:12px;color:var(--text2);margin-bottom:4px}
  .log-note{font-size:12px;color:var(--text3);font-style:italic}
  .log-duration{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--bg4);color:var(--text2);white-space:nowrap}

  /* QUIZ MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
  .modal-close{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center}
  .quiz-q{font-size:15px;line-height:1.6;margin-bottom:20px;color:var(--text)}
  .quiz-options{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .quiz-option{padding:11px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer;font-size:13px;text-align:left;color:var(--text2);transition:all .2s;font-family:'DM Sans',sans-serif}
  .quiz-option:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:rgba(124,95,212,.08)}
  .quiz-option.correct{border-color:var(--green);background:rgba(46,204,138,.12);color:var(--green)}
  .quiz-option.wrong{border-color:var(--red);background:rgba(232,80,80,.1);color:#ff8080}
  .quiz-feedback{font-size:13px;color:var(--text2);background:var(--bg3);border-radius:var(--radius2);padding:12px;margin-bottom:16px;line-height:1.6;display:none}
  .quiz-feedback.show{display:block}
  .quiz-next{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius2);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:none}
  .quiz-next.show{display:block}
  .quiz-result{text-align:center;padding:20px 0}
  .quiz-score{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--accent2)}
  .quiz-score-label{font-size:14px;color:var(--text2);margin-top:4px}
  .quiz-bar-wrap{margin:16px 0;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
  .quiz-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s ease}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">Study<span>Flow</span></div>
    <div class="header-right">
      <div class="streak-badge"><span class="streak-fire">🔥</span><span id="streak-count">0</span>日連続</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('plan')">📊 プラン</button>
    <button class="tab" onclick="switchTab('cards')">🃏 フラッシュカード</button>
    <button class="tab" onclick="switchTab('log')">📝 学習ログ</button>
  </div>

  <!-- PLAN PANEL -->
  <div class="panel active" id="panel-plan">
    <div class="exam-countdown">
      <div>
        <div class="countdown-label">NAIST 入試まで</div>
        <div class="countdown-days" id="days-left">—</div>
        <div class="countdown-sub">日</div>
      </div>
      <div class="countdown-right">
        <div class="countdown-target">NAIST 大学院入試</div>
        <div class="countdown-date">2025年7月上旬</div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">Sakti Sakriani 研究室</div>
      </div>
    </div>

    <div class="section-title">教科別 進捗</div>
    <div class="subjects-grid" id="subjects-grid"></div>

    <div class="overall-progress">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-title" style="margin:0">総合進捗</div>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent2)" id="overall-pct">0%</div>
      </div>
      <div class="overall-bar"><div class="overall-fill" id="overall-bar" style="width:0%"></div></div>
      <div class="overall-nums">
        <span id="overall-done">完了 0章</span>
        <span id="overall-total">全 0章</span>
      </div>
    </div>

    <div class="section-title">学習スケジュール</div>
    <div class="plan-section" id="plan-schedule"></div>

    <div style="margin-top:20px">
      <div class="section-title">今週の目標</div>
      <div class="plan-section">
        <div class="plan-row">
          <div class="plan-dot" style="background:var(--accent)"></div>
          <div class="plan-text" style="font-size:13px">線形代数：行列の演算・固有値まで完了</div>
          <span class="plan-tag tag-today">今週</span>
        </div>
        <div class="plan-row">
          <div class="plan-dot" style="background:var(--green)"></div>
          <div class="plan-text" style="font-size:13px">微積分：極限・微分の基礎問題 30問</div>
          <span class="plan-tag tag-today">今週</span>
        </div>
        <div class="plan-row">
          <div class="plan-dot" style="background:var(--blue)"></div>
          <div class="plan-text" style="font-size:13px">確率統計：確率の基本定理を復習</div>
          <span class="plan-tag tag-upcoming">来週</span>
        </div>
        <div class="plan-row">
          <div class="plan-dot" style="background:var(--amber)"></div>
          <div class="plan-text" style="font-size:13px">過去問：NAIST 2022年度 数学</div>
          <span class="plan-tag tag-exam">重要</span>
        </div>
      </div>
    </div>
  </div>

  <!-- FLASHCARD PANEL -->
  <div class="panel" id="panel-cards">
    <div class="section-title">分野を選択</div>
    <div class="fc-topics" id="fc-topics"></div>
    <div class="fc-area active" id="fc-main">
      <div style="text-align:center;padding:40px;color:var(--text3)">上のカテゴリを選んでカードを開始してください</div>
    </div>
  </div>

  <!-- LOG PANEL -->
  <div class="panel" id="panel-log">
    <div class="section-title">学習を記録する</div>
    <div class="log-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">教科</label>
          <select class="form-input" id="log-subject">
            <option value="linear">線形代数</option>
            <option value="calculus">微積分</option>
            <option value="ml">機械学習</option>
            <option value="prob">確率統計</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">学習時間 (分)</label>
          <input type="number" class="form-input" id="log-duration" placeholder="60" min="1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">章・トピック</label>
          <input type="text" class="form-input" id="log-chapter" placeholder="例：第3章 固有値">
        </div>
        <div class="form-group">
          <label class="form-label">理解度</label>
          <select class="form-input" id="log-understanding">
            <option value="3">よく理解できた</option>
            <option value="2">まあまあ</option>
            <option value="1">難しかった</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">メモ</label>
        <textarea class="form-note" id="log-note" placeholder="今日気づいたこと、復習すべき点など…"></textarea>
      </div>
      <button class="submit-btn" onclick="addLog()">ログを保存</button>
    </div>
    <div class="section-title">学習履歴</div>
    <div class="log-list" id="log-list">
      <div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">まだ記録がありません。最初のログを追加しましょう！</div>
    </div>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="modal-overlay" id="quiz-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="quiz-modal-title">章末テスト</div>
      <button class="modal-close" onclick="closeQuiz()">✕</button>
    </div>
    <div id="quiz-body"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, push, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAFpjxHFKgOs1ke7g3klzhQxAiOvMwfFRQ",
  authDomain: "study-tracker-5a35c.firebaseapp.com",
  databaseURL: "https://study-tracker-5a35c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "study-tracker-5a35c",
  storageBucket: "study-tracker-5a35c.firebasestorage.app",
  messagingSenderId: "1091326221496",
  appId: "1:1091326221496:web:5bcd5ab27bdc6cca03e84d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== DATA =====
const SUBJECTS = {
  linear: { name: '線形代数', color: 'linear-algebra', dot: '#7C5FD4', chapters: ['ベクトルと空間','行列と演算','行列式','固有値と固有ベクトル','線形変換','直交化と最小二乗法','特異値分解'] },

// ===== SUBJECTS =====
function renderSubjects() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';
  Object.entries(SUBJECTS).forEach(([key, sub]) => {
    const prog = progressData[key] || { correct: 0, quizDone: 0 };
    const chapsPct = Math.round((prog.quizDone || 0) / sub.chapters.length * 100);
    const pct = prog.quizDone > 0 ? Math.round((prog.correct / (QUIZZES[key].length * prog.quizDone)) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'subject-card ' + sub.color;
    card.innerHTML = `
      <div class="subject-header">
        <div>
          <div class="subject-name">${sub.name}</div>
          <div class="subject-chapter">${sub.chapters[Math.min(prog.quizDone||0, sub.chapters.length-1)]}</div>
        </div>
        <div class="subject-pct">${chapsPct}%</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${chapsPct}%"></div></div>
      <div class="subject-stats">
        <div class="stat-item"><strong>${prog.quizDone||0}/${sub.chapters.length}</strong>章完了</div>
        <div class="stat-item"><strong>${pct}%</strong>正答率</div>
        <div class="stat-item"><strong>${prog.correct||0}</strong>正解</div>
      </div>
      <button class="quiz-btn" onclick="openQuiz('${key}')">章末テストを受ける →</button>
    `;
    grid.appendChild(card);
  });
  updateSchedule();
}

function renderOverall() {
  let totalCorrect = 0, totalDone = 0;
  const totalChaps = Object.values(SUBJECTS).reduce((a, s) => a + s.chapters.length, 0);
  Object.entries(SUBJECTS).forEach(([key]) => {
    const prog = progressData[key] || {};
    totalCorrect += prog.correct || 0;
    totalDone += prog.quizDone || 0;
  });
  const totalQuestions = Object.values(QUIZZES).reduce((a, q) => a + q.length, 0);
  const pct = totalQuestions > 0 ? Math.min(100, Math.round((totalCorrect / (totalQuestions * Object.keys(SUBJECTS).length)) * 100)) : 0;
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-done').textContent = '完了 ' + totalDone + '章';
  document.getElementById('overall-total').textContent = '全 ' + totalChaps + '章';
}

function updateSchedule() {
  const sched = document.getElementById('plan-schedule');
  const entries = Object.entries(SUBJECTS).map(([key, sub]) => {
    const prog = progressData[key] || {};
    const done = prog.quizDone || 0;
    const next = sub.chapters[Math.min(done, sub.chapters.length - 1)];
    return { name: sub.name, next, done, total: sub.chapters.length, dot: sub.dot };
  });
  sched.innerHTML = entries.map(e => `
    <div class="plan-row">
      <div class="plan-dot" style="background:${e.dot}"></div>
      <div class="plan-text">${e.name}：${e.done < e.total ? '次は「' + e.next + '」' : '全章完了！'}</div>
      <span class="plan-tag ${e.done >= e.total ? 'tag-done' : 'tag-upcoming'}">${e.done}/${e.total}</span>
    </div>
  `).join('');
}

window.openQuiz = function(subject) {
  quizData = { subject, questions: [...QUIZZES[subject]], current: 0, score: 0, answered: false };
  document.getElementById('quiz-modal-title').textContent = SUBJECTS[subject].name + ' 章末テスト';
  document.getElementById('quiz-modal').classList.add('open');
  renderQuizQ();
};

window.closeQuiz = function() {
  document.getElementById('quiz-modal').classList.remove('open');
};

function renderQuizQ() {
  const body = document.getElementById('quiz-body');
  if (quizData.current >= quizData.questions.length) {
    const pct = Math.round(quizData.score / quizData.questions.length * 100);
    saveProgress(quizData.subject, quizData.score, quizData.questions.length);
    body.innerHTML = `
      <div class="quiz-result">
        <div class="quiz-score">${pct}%</div>
        <div class="quiz-score-label">${quizData.score}/${quizData.questions.length} 問正解</div>
        <div class="quiz-bar-wrap"><div class="quiz-bar-fill" style="width:${pct}%"></div></div>
        <p style="font-size:13px;color:var(--text2);margin-top:12px">${pct >= 80 ? '素晴らしい！次の章に進みましょう 🎉' : pct >= 60 ? 'もう少し復習してから次へ進もう' : 'フラッシュカードで復習してから再挑戦！'}</p>
        <button class="submit-btn" style="margin-top:16px" onclick="closeQuiz()">閉じる</button>
      </div>
    `;
    return;
  }
  const q = quizData.questions[quizData.current];
  body.innerHTML = `
    <div style="font-size:11px;color:var(--text3);margin-bottom:14px">${quizData.current + 1} / ${quizData.questions.length}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-options">
      ${q.opts.map((o, i) => `<button class="quiz-option" onclick="answerQuiz(${i})">${o}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="qfb"></div>
    <button class="quiz-next" id="qnext" onclick="nextQ()">次の問題 →</button>
  `;
}

window.answerQuiz = function(idx) {
  if (quizData.answered) return;
  quizData.answered = true;
  const q = quizData.questions[quizData.current];
  const opts = document.querySelectorAll('.quiz-option');
  const fb = document.getElementById('qfb');
  const nxt = document.getElementById('qnext');
  opts.forEach(o => o.disabled = true);
  if (idx === q.ans) {
    opts[idx].classList.add('correct');
    quizData.score++;
    fb.textContent = '✓ 正解！ ' + q.exp;
    fb.style.borderLeft = '3px solid var(--green)';
  } else {
    opts[idx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    fb.textContent = '✕ 解説：' + q.exp;
    fb.style.borderLeft = '3px solid var(--red)';
  }
  fb.classList.add('show');
  nxt.classList.add('show');
};

window.nextQ = function() {
  quizData.current++;
  quizData.answered = false;
  renderQuizQ();
};

async function saveProgress(subject, correct, total) {
  const prog = progressData[subject] || { correct: 0, quizDone: 0 };
  await set(ref(db, 'progress/' + subject), {
    correct: (prog.correct || 0) + correct,
    quizDone: (prog.quizDone || 0) + 1
  });
  await updateStreak();
}

async function updateStreak() {
  const snap = await get(streakRef);
  const streak = snap.val() || { count: 0, lastDate: '' };
  const today = new Date().toDateString();
  if (streak.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    await set(streakRef, {
      count: streak.lastDate === yesterday ? streak.count + 1 : 1,
      lastDate: today
    });
  }
}

  fcData = { topic, cards: [...FLASHCARDS[topic]], current: 0, flipped: false, correct: 0 };
  renderFC();
};

function renderFC() {
  const area = document.getElementById('fc-main');
  const card = fcData.cards[fcData.current];
  if (!card) {
    const pct = Math.round(fcData.correct / fcData.cards.length * 100);
    area.innerHTML = `
      <div style="text-align:center;padding:32px">
        <div style="font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--accent2)">${pct}%</div>
        <div style="font-size:14px;color:var(--text2);margin:8px 0 20px">正答率（${fcData.correct}/${fcData.cards.length}枚）</div>
        <button class="quiz-btn" style="max-width:200px;margin:0 auto;display:block;padding:10px" onclick="document.querySelectorAll('.fc-topic').forEach(t=>t.classList.remove('selected'));startFC('${fcData.topic}', document.querySelector('.fc-topic'))">もう一度</button>
      </div>
    `;
    return;
  }
  area.innerHTML = `
    <div class="fc-card ${fcData.flipped ? 'flipped' : ''}" onclick="flipFC()">
      <div>
        <div class="fc-tag">${card.tag}</div>
        <div class="${fcData.flipped ? 'fc-a' : 'fc-q'}">${(fcData.flipped ? card.a : card.q).replace(/\n/g, '<br>')}</div>
        <div class="fc-card-hint">${fcData.flipped ? '← 問題に戻る' : 'タップで答えを表示'}</div>
      </div>
    </div>
    ${fcData.flipped ? `
    <div class="fc-actions">
      <button class="fc-btn wrong" onclick="fcAnswer(false)">✕ 不正解</button>
      <button class="fc-btn next" onclick="fcAnswer(null)">→ スキップ</button>
      <button class="fc-btn correct" onclick="fcAnswer(true)">✓ 正解</button>
    </div>` : ''}
    <div class="fc-progress-line">${fcData.current + 1} / ${fcData.cards.length}</div>
  `;
}

window.flipFC = function() {
  fcData.flipped = !fcData.flipped;
  renderFC();
};

window.fcAnswer = function(correct) {
  if (correct === true) fcData.correct++;
  fcData.current++;
  fcData.flipped = false;
  renderFC();
};

// ===== LOG =====
window.addLog = function() {
  const subject = document.getElementById('log-subject').value;
  const duration = parseInt(document.getElementById('log-duration').value) || 0;
  const chapter = document.getElementById('log-chapter').value.trim();
  const understanding = parseInt(document.getElementById('log-understanding').value);
  const note = document.getElementById('log-note').value.trim();
  if (!duration || !chapter) { alert('学習時間と章・トピックを入力してください'); return; }
  push(logsRef, {
    subject, duration, chapter, understanding, note,
    timestamp: Date.now(),
    date: new Date().toLocaleDateString('ja-JP')
  });
  document.getElementById('log-duration').value = '';
  document.getElementById('log-chapter').value = '';
  document.getElementById('log-note').value = '';
  updateStreak();
};

function renderLogs() {
  const list = document.getElementById('log-list');
  if (!logs.length) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">まだ記録がありません。最初のログを追加しましょう！</div>';
    return;
  }
  const uLabels = ['', '難しかった', 'まあまあ', 'よく理解できた'];
  const uColors = ['', 'var(--red)', 'var(--amber)', 'var(--green)'];
  list.innerHTML = logs.slice(0, 30).map(log => `
    <div class="log-item">
      <div class="log-dot" style="background:${SUBJECTS[log.subject]?.dot || '#888'}"></div>
      <div class="log-content">
        <div class="log-top">
          <span class="log-subject">${SUBJECTS[log.subject]?.name || log.subject}</span>
          <span class="log-duration">${log.duration}分</span>
        </div>
        <div class="log-chapter">${log.chapter}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <span style="font-size:11px;color:${uColors[log.understanding]}">${uLabels[log.understanding]}</span>
          <span class="log-time">${log.date}</span>
        </div>
        ${log.note ? `<div class="log-note">${log.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ===== INIT =====
renderTopics();
</script>
</body>
</html>
