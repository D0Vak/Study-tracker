<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>院試・TOEIC 戦略トラッカー</title>
<style>
:root {
  --bg:#fafaf8;--bg2:#f2f0ea;--card:#fff;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,.1);
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --green:#3b6d11;--green-bg:#eaf3de;
  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
  --radius:12px;--shadow:0 4px 12px rgba(0,0,0,.05);
}
@media(prefers-color-scheme:dark){
  :root{ --bg:#141412;--bg2:#1e1e1c;--card:#1e1e1c;--text:#e8e6df;--text2:#b4b2a9;--border:rgba(255,255,255,.1);--blue:#85b7eb;--blue-bg:#0c447c; }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}
.app{max-width:600px;margin:0 auto;padding:1rem 1rem 5rem}

/* ── HEADER & NAV ── */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.nav-tabs{display:flex;gap:4px;background:var(--bg2);padding:4px;border-radius:var(--radius);margin-bottom:1.5rem}
.nav-btn{flex:1;border:none;padding:10px;border-radius:8px;background:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:0.2s}
.nav-btn.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

/* ── TODAY'S MISSION ── */
.mission-card{background:linear-gradient(135deg, var(--blue), #4a90e2);color:white;padding:1.2rem;border-radius:var(--radius);margin-bottom:1.5rem;box-shadow:0 8px 20px rgba(24,95,165,0.2)}
.mission-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:0.9}
.mission-title{font-size:18px;font-weight:700;margin-top:4px}

/* ── COMMON CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.section-title{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:1rem;display:flex;justify-content:space-between}

/* ── PROGRESS UI ── */
.prog-row{margin-bottom:15px}
.prog-info{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.prog-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;transition:width 0.5s ease-out}

/* ── KNOWLEDGE (FLASHCARDS) ── */
.filter-tabs{display:flex;gap:5px;margin-bottom:1rem;overflow-x:auto;padding-bottom:5px}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;background:var(--card);white-space:nowrap;cursor:pointer}
.filter-btn.active{background:var(--text);color:var(--bg)}
.k-card{border-left:4px solid var(--blue);padding:10px;margin-bottom:8px;background:var(--bg2);border-radius:0 var(--radius) var(--radius) 0;cursor:pointer}
.k-ans{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:13px;color:var(--blue)}
.k-card.open .k-ans{display:block}

/* ── INPUTS ── */
input, textarea, select{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);margin-bottom:10px;font-family:inherit}
.btn-main{width:100%;padding:14px;border-radius:8px;border:none;background:var(--blue);color:white;font-weight:700;cursor:pointer}

/* ── SCREENS ── */
.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>

<div class="app" id="main-app" style="display:none">
  <header>
    <div id="sync-status" style="font-size:11px; color:var(--text3)">● Connected</div>
    <button onclick="localStorage.clear();location.reload()" style="font-size:10px; background:none; border:none; color:var(--text3)">Reset Config</button>
  </header>

  <div class="mission-card">
    <div class="mission-label">Today's Focus</div>
    <div id="mission-content" class="mission-title">読み込み中...</div>
  </div>

  <nav class="nav-tabs">
    <button class="nav-btn active" onclick="switchTab('plan', this)">Plan</button>
    <button class="nav-btn" onclick="switchTab('knowledge', this)">Knowledge</button>
    <button class="nav-btn" onclick="switchTab('logs', this)">Logs</button>
  </nav>

  <div id="screen-plan" class="screen active">
    <div class="card">
      <div class="section-title"><span>COUNTDOWN</span></div>
      <div id="countdown-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center"></div>
    </div>
    <div class="card">
      <div class="section-title"><span>SUBJECT PROGRESS</span></div>
      <div id="subject-list"></div>
    </div>
  </div>

  <div id="screen-knowledge" class="screen">
    <div class="card">
      <div class="section-title"><span>ADD KNOWLEDGE</span></div>
      <select id="k-input-sub">
        <option value="線形代数">線形代数</option>
        <option value="微積分">微積分</option>
        <option value="アルゴリズム">アルゴリズム</option>
        <option value="TOEIC">TOEIC</option>
        <option value="専門">専門</option>
      </select>
      <input type="text" id="k-input-term" placeholder="用語・概念名">
      <textarea id="k-input-concept" rows="2" placeholder="自分なりの直感的な説明"></textarea>
      <button class="btn-main" onclick="addKnowledge()">知識を刻む</button>
    </div>
    
    <div class="filter-tabs" id="k-filters"></div>
    <div id="k-list"></div>
  </div>

  <div id="screen-logs" class="screen">
    <div class="card">
      <div class="section-title"><span>DAILY LOG</span></div>
      <input type="text" id="log-input" placeholder="今日進めた内容を入力">
      <button class="btn-main" onclick="addLog()">記録を保存</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<div id="setup-screen" style="padding:2rem; text-align:center">
  <h3>Firebase Setup</h3>
  <textarea id="setup-cfg" placeholder="Paste Firebase Config here" style="height:200px; margin-top:1rem"></textarea>
  <button class="btn-main" onclick="initFromSetup()">Start App</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONSTANTS ---
const EXAMS = [
  { name:'TOEIC', date:'2026-05-17', color:'#f5a623' },
  { name:'NAIST', date:'2026-07-01', color:'#185fa5' },
  { name:'KOBE', date:'2026-08-28', color:'#d0021b' }
];

const SUBJECTS = [
  { id:'linear', name:'線形代数', color:'#4caf50' },
  { id:'calc', name:'微積分', color:'#4caf50' },
  { id:'algo', name:'アルゴリズム', color:'#ff9800' },
  { id:'toeic', name:'TOEIC', color:'#2196f3' }
];

// --- APP STATE ---
let dbRef;
let state = {
  subjects: { linear:30, calc:30, algo:10, toeic:50 },
  knowledge: [],
  logs: [],
  currentFilter: 'All'
};

// --- INITIALIZATION ---
function initFromSetup() {
  const cfgStr = document.getElementById('setup-cfg').value;
  try {
    const cfg = JSON.parse(cfgStr.includes('{') ? cfgStr : `{${cfgStr}}`);
    localStorage.setItem('fb_cfg', JSON.stringify(cfg));
    location.reload();
  } catch(e) { alert('Configの形式が正しくありません'); }
}

window.onload = () => {
  const savedCfg = localStorage.getItem('fb_cfg');
  if(savedCfg) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    startFirebase(JSON.parse(savedCfg));
  }
};

function startFirebase(cfg) {
  const app = firebase.initializeApp(cfg);
  dbRef = firebase.database(app).ref('v3_data');
  dbRef.on('value', snap => {
    if(snap.val()) state = snap.val();
    if(!state.knowledge) state.knowledge = [];
    if(!state.logs) state.logs = [];
    render();
  });
}

// --- CORE RENDER ---
function render() {
  renderMission();
  renderPlan();
  renderKnowledge();
  renderLogs();
}

function renderMission() {
  // 日付に基づいた「今日やるべきこと」の簡易レコメンド
  const today = new Date();
  const toeicDate = new Date('2026-05-17');
  const daysToToeic = Math.ceil((toeicDate - today)/(1000*60*60*24));
  
  let mission = "";
  if(daysToToeic > 0 && daysToToeic < 30) {
    mission = `TOEICまで${daysToToeic}日：公式問題集を解き、Part5の誤答をカード化せよ`;
  } else {
    mission = "線形代数：固有値問題の計算スピードを上げる演習を優先";
  }
  document.getElementById('mission-content').innerText = mission;
}

function renderPlan() {
  // Countdown
  const now = new Date();
  document.getElementById('countdown-list').innerHTML = EXAMS.map(e => {
    const diff = Math.max(0, Math.ceil((new Date(e.date) - now)/86400000));
    return `<div><div style="font-size:20px; font-weight:800; color:${e.color}">${diff}</div><div style="font-size:10px; color:var(--text3)">${e.name}</div></div>`;
  }).join('');

  // Subjects
  document.getElementById('subject-list').innerHTML = SUBJECTS.map(s => {
    const val = state.subjects[s.id] || 0;
    return `
      <div class="prog-row">
        <div class="prog-info"><span>${s.name}</span><b>${val}%</b></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${val}%; background:${s.color}"></div></div>
        <input type="range" min="0" max="100" value="${val}" onchange="updateSubj('${s.id}', this.value)" style="margin:5px 0">
      </div>`;
  }).join('');
}

function renderKnowledge() {
  // Filters
  const subs = ['All', ...new Set(state.knowledge.map(k => k.sub))];
  document.getElementById('k-filters').innerHTML = subs.map(s => 
    `<button class="filter-btn ${state.currentFilter===s?'active':''}" onclick="state.currentFilter='${s}';renderKnowledge()">${s}</button>`
  ).join('');

  // List
  const filtered = state.currentFilter === 'All' 
    ? state.knowledge 
    : state.knowledge.filter(k => k.sub === state.currentFilter);

  document.getElementById('k-list').innerHTML = filtered.slice().reverse().map((k, i) => `
    <div class="k-card" onclick="this.classList.toggle('open')">
      <div style="font-size:10px; color:var(--text3)">${k.sub}</div>
      <div style="font-weight:600">${esc(k.term)}</div>
      <div class="k-ans">${esc(k.concept)}</div>
    </div>
  `).join('');
}

function renderLogs() {
  document.getElementById('log-list').innerHTML = state.logs.slice().reverse().map(l => `
    <div class="card" style="padding:10px; font-size:13px; margin-bottom:5px">
      <span style="color:var(--text3); font-size:10px">${l.date}</span><br>${esc(l.text)}
    </div>
  `).join('');
}

// --- ACTIONS ---
function switchTab(screenId, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updateSubj(id, val) {
  state.subjects[id] = parseInt(val);
  dbRef.update({subjects: state.subjects});
}

function addKnowledge() {
  const sub = document.getElementById('k-input-sub').value;
  const term = document.getElementById('k-input-term').value;
  const concept = document.getElementById('k-input-concept').value;
  if(!term || !concept) return;
  state.knowledge.push({sub, term, concept});
  dbRef.update({knowledge: state.knowledge});
  document.getElementById('k-input-term').value = '';
  document.getElementById('k-input-concept').value = '';
}

function addLog() {
  const text = document.getElementById('log-input').value;
  if(!text) return;
  const date = new Date().toLocaleDateString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  state.logs.push({text, date});
  dbRef.update({logs: state.logs});
  document.getElementById('log-input').value = '';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
</script>
</body>
</html>
