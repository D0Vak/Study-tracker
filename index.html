<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow v23 — 院試/専門科目 統合学習システム</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F6F5F1;--bg2:#FFFFFF;--bg3:#EFEDE8;--bg4:#E5E3DC;
  --border:#DDD9D0;--border2:#C4C0B5;
  --text:#1A1916;--text2:#5A5850;--text3:#98958E;
  --accent:#7C5FD4;--accent2:#9B7FF0;--alight:#F0ECFF;--aborder:#C4ADFF;
  --green:#167A50;--gbg:#E6F4EE;--gborder:#8FD9B8;
  --amber:#7A5200;--abg2:#FEF2D8;--aborder2:#F5C060;
  --red:#9E2A2A;--rbg:#FBEBEB;--rborder:#F0BABA;
  --blue:#145898;--bbg:#E4F0FB;--bborder:#A8CCF0;
  --teal:#0C6A52;--tbg:#DFF2EC;--tborder:#8FD4BE;
  --pink:#8B1D5A;--indigo:#2C3BAA;
  --r:12px;--r2:8px;--r3:20px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 18px rgba(0,0,0,.09);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.font-num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
#app{max-width:1050px;margin:0 auto;padding:24px 16px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:10px}
.streak{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:6px 14px;font-size:13px;font-weight:500;box-shadow:var(--sh)}
.db-count{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);padding:4px 10px}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:24px;box-shadow:var(--sh);overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:8px 12px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;border-radius:var(--r2);cursor:pointer;transition:all .18s;text-align:center;white-space:nowrap}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(124,95,212,.3)}
.tab:hover:not(.active){background:var(--bg3);color:var(--text)}
.panel{display:none}.panel.active{display:block}
.stitle{font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:1.6px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}

/* COUNTDOWN CARDS */
.cdown-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
@media(max-width:580px){.cdown-grid{grid-template-columns:1fr}}
.cdown-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.cdown-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cd-toeic::before{background:linear-gradient(90deg,#0C6A52,#2EC4B6)}
.cd-naist::before{background:linear-gradient(90deg,#7C5FD4,#9B7FF0)}
.cd-kobe::before{background:linear-gradient(90deg,#145898,#4A9EF0)}
.cd-badge{font-size:10px;font-weight:700;display:inline-block;padding:3px 8px;border-radius:6px;margin-bottom:10px}
.cd-days{font-family:'Inter',sans-serif;font-size:42px;font-weight:800;line-height:1;margin-bottom:3px}
.cd-toeic .cd-days{color:var(--teal)}.cd-naist .cd-days{color:var(--accent)}.cd-kobe .cd-days{color:var(--blue)}
.cd-unit{font-size:11px;color:var(--text3);margin-bottom:7px}
.cd-name{font-size:12px;font-weight:500;color:var(--text2)}

/* SUBJECT CARDS */
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:24px}
.subj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:all .18s}
.subj-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc-la::before{background:var(--accent)}.sc-ca::before{background:var(--green)}.sc-ml::before{background:var(--blue)}.sc-pr::before{background:var(--amber)}.sc-cf::before{background:var(--pink)}.sc-cs::before{background:var(--indigo)}
.sc-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.sc-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.sc-pct{font-family:'Inter',sans-serif;font-size:20px;font-weight:800}
.prog-bar{height:5px;background:var(--bg4);border-radius:3px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;transition:width .6s ease}
.sc-stats{display:flex;gap:12px;font-size:11px;color:var(--text3)}
.quiz-btn{width:100%;margin-top:12px;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);font-size:12px;cursor:pointer;font-weight:600}

/* GALAXY ENGINE (Stable Visualization) */
.galaxy-wrap{height:600px; width:100%; background:#05040a; border-radius:var(--r); position:relative; border:1px solid var(--border); margin-bottom:24px; overflow:hidden; box-shadow:var(--sh2)}
#galaxy-svg{width:100%; height:100%; min-height:600px; background: radial-gradient(circle, #131129 0%, #000 80%); display:block; cursor: grab;}
.galaxy-info{position:absolute;bottom:20px;left:20px;background:rgba(13,11,26,0.96);padding:18px;border-radius:10px;border:1px solid var(--accent);max-width:350px;display:none;backdrop-filter:blur(15px);z-index:100;box-shadow:var(--sh);color:#fff}

/* STUDY COMPONENTS */
.chips{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto; padding-bottom:5px}
.chip{padding:10px 18px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:20px;cursor:pointer;font-size:11px;white-space:nowrap; transition:0.2s}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(124,95,212,0.1)}
.fc-card{min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:22px;font-weight:700;cursor:pointer;background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:40px; line-height:1.6; transition:all 0.3s;box-shadow:var(--sh)}
.fc-card.flipped{border-color:var(--accent);background:var(--alight)}

/* ANALYTICS */
.ana-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.ana-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--sh)}
.ana-val{font-family:'Inter',sans-serif;font-size:32px;font-weight:800;margin-bottom:4px;color:var(--accent)}

/* GRAPH */
.graph-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:22px;box-shadow:var(--sh)}
.graph-bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:12px}
.gbar-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
.gbar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--accent2),var(--accent));min-height:2px}

/* FORM ELEMENTS */
input, select, textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:var(--r2);width:100%;margin-bottom:12px;outline:none;font-family:inherit}
.btn-p{background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r2);cursor:pointer;font-weight:700;width:100%; transition: 0.2s}
.btn-p:hover{opacity: 0.9; transform: translateY(-1px)}

#ai-debug-log{color:var(--pink); font-size:11px; margin-top:10px; background:#1a0000; padding:10px; border-radius:8px; white-space:pre-wrap; display:none}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, push, get, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// Firebase Config
const FB = {apiKey:"AIzaSyAFpjxHFKgOs1ke7g3klzhQxAiOvMwfFRQ",authDomain:"study-tracker-5a35c.firebaseapp.com",databaseURL:"https://study-tracker-5a35c-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"study-tracker-5a35c",appId:"1:1091326221496:web:5bcd5ab27bdc6cca03e84d"};
const fbApp = initializeApp(FB);
const db = getDatabase(fbApp);

/* ══════════════════════════════════════
   DATABASE: FULL KNOWLEDGE DATA
══════════════════════════════════════ */
const SUBJECTS = {
  la:{name:'線形代数',cls:'sc-la',dot:'#7C5FD4',areas:['行列演算','固有値','次元定理','SVD'],chapters:['行列','空間','固有値','分解']},
  ca:{name:'微積分',cls:'sc-ca',dot:'#167A50',areas:['微分','積分','多変数','級数'],chapters:['微分','積分','多変数']},
  cf:{name:'複素関数',cls:'sc-cf',dot:'#8B1D5A',areas:['正則性','コーシー積分','留数定理'],chapters:['正則','積分','留数']},
  de:{name:'常微分方程式',cls:'sc-de',dot:'#E67E22',areas:['1階線形','2階定数係数','ラプラス変換'],chapters:['1階','2階','ラプラス']},
  ml:{name:'機械学習',cls:'sc-ml',dot:'#145898',areas:['正則化','DeepLearning','最適化'],chapters:['基本','ニューラルネット']},
  cs:{name:'CS/アルゴリズム',cls:'sc-cs',dot:'#7A5200',areas:['計算量','ソート','データ構造'],chapters:['計算量','ソート','構造']},
  en:{name:'英語(TOEIC)',cls:'sc-en',dot:'#8A4A00',areas:['TOEIC語彙','論文表現'],chapters:['単語','文法']}
};

const BANK = JSON.parse(localStorage.getItem('study_v23_bank')) || [
  {cat:'la', q:'固有値 λ と固有ベクトル v の関係式', a:'Av = λv', area:'固有値'},
  {cat:'cf', q:'オイラーの公式', a:'e^(iθ) = cosθ + i sinθ', area:'正則性'},
  {cat:'de', q:'変数分離形の解法', a:'dy/dx = f(x)g(y) ➔ ∫(1/g(y))dy = ∫f(x)dx', area:'1階線形'},
  {cat:'cs', q:'クイックソートの平均計算量', a:'O(n log n)', area:'ソート'},
  {cat:'en', q:'Incur', a:'(負債などを)負う、招く', area:'TOEIC語彙'}
];

const QUIZZES = {
  la: [{q:'det(A)=0 の時、行列Aは？', o:['正則行列','特異行列','単位行列'], a:1}],
  ca: [{q:'sin(x)/x (x→0) の極限は？', o:['0','1','∞'], a:1}]
};

/* ══════════════════════════════════════
   SYSTEM LOGIC & UI
══════════════════════════════════════ */
let curTab = 'plan', curMode = 'fc', curSubj = 'la', curIdx = 0;
const MY_KEY = "AIzaSyCdwmg_WejVCUU1GDpV_R8TdPqFmDm_h6E";

function updateCountdown() {
  const diff = (t) => Math.max(0, Math.ceil((new Date(t) - new Date()) / (1000*60*60*24)));
  document.getElementById('d-toeic').innerText = diff('2026-05-17');
  document.getElementById('d-naist').innerText = diff('2026-07-06');
  document.getElementById('d-kobe').innerText = diff('2026-08-24');
}

window.switchTab = (t) => {
  document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
  const activeTabBtn = Array.from(document.querySelectorAll('.tab')).find(b => b.onclick.toString().includes(t));
  if(activeTabBtn) activeTabBtn.classList.add('active');
  if(t === 'galaxy') setTimeout(initGalaxy, 100);
  if(t === 'study') renderStudy();
};

window.setMode = (m, el) => { curMode = m; curIdx = 0; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); renderStudy(); };

/* ══════════════════════════════════════
   GALAXY ENGINE (D3.JS FULL)
══════════════════════════════════════ */
function initGalaxy() {
  const wrap = document.getElementById('galaxy-container');
  const width = wrap.clientWidth, height = wrap.clientHeight;
  const nodes = [{id:'YOU', r:25, fx: width/2, fy: height/2, name:'YOU'}];
  const links = [];

  Object.keys(SUBJECTS).forEach(s => {
    nodes.push({id: s, name: SUBJECTS[s].name, r:18, type:'subj'});
    links.push({source:'YOU', target: s});
    SUBJECTS[s].areas.forEach(area => {
      const areaId = s + '_' + area;
      nodes.push({id: areaId, name: area, group: s, r:10, type:'area'});
      links.push({source: s, target: areaId});
    });
  });

  BANK.forEach((k, i) => {
    const fid = `k${i}`;
    nodes.push({id: fid, name: k.q, detail: k.a, group: k.cat, r:6, type:'fact'});
    const pid = k.area ? k.cat + '_' + k.area : k.cat;
    links.push({source: pid, target: fid});
  });

  const svg = d3.select("#galaxy-svg"); svg.selectAll("*").remove();
  const g = svg.append("g");
  svg.call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)));

  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(60))
    .force("charge", d3.forceManyBody().strength(-350))
    .force("center", d3.forceCenter(width/2, height/2))
    .force("collision", d3.forceCollide().radius(d => d.r + 12));

  const link = g.append("g").selectAll("line").data(links).join("line").attr("stroke", "#2A2845").attr("stroke-opacity", 0.6);
  const node = g.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("r", d => d.r).attr("fill", d => SUBJECTS[d.group || d.id]?.color || "#fff")
    .attr("stroke", d => d.id==='YOU'?'#fff':'none').attr("stroke-width", 2)
    .on("click", (e, d) => {
      if(d.detail) {
        const info = document.getElementById('galaxy-info'); info.style.display = 'block';
        info.innerHTML = `<strong>${d.name}</strong><hr style="border:0;border-top:1px solid #333;margin:8px 0">${d.detail}`;
      }
    });

  const label = g.append("g").selectAll("text").data(nodes.filter(n => n.r > 9)).join("text")
    .text(d => d.name).attr("fill", "#ccc").attr("font-size", "10px").attr("dx", 22).attr("dy", 4);

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });
  document.getElementById('star-count').innerText = nodes.length;
}

/* ══════════════════════════════════════
   AI ENGINE (Gemini 2.5 Flash Free Tier)
══════════════════════════════════════ */
let lastAIResult = "";
async function askGemini() {
  const subj = document.getElementById('ai-subj-sel').value, out = document.getElementById('ai-output'), txt = document.getElementById('ai-txt'), btn = document.getElementById('ai-btn'), debug = document.getElementById('ai-debug-log');
  out.style.display = 'block'; txt.innerText = "Gemini 2.5 Flash が最先端推論を用いて問題を生成中..."; btn.disabled = true; debug.style.display = "none"; debug.innerText = "";

  // 無料枠で利用可能な2.5系列を優先
  const models = ["gemini-2.5-flash", "gemini-2.5-flash-lite", "gemini-2.0-flash", "gemini-1.5-flash"];
  let success = false;

  for(let m of models) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1/models/${m}:generateContent?key=${MY_KEY}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: `${subj}に関する大学院入試レベルの専門的な計算・証明問題を1問作成し、詳しいステップ付きの解答とポイントを日本語で付けてください。` }] }] })
      });
      const data = await res.json();
      if(data.candidates && data.candidates[0].content) {
        lastAIResult = data.candidates[0].content.parts[0].text;
        txt.innerText = lastAIResult;
        success = true; break;
      } else {
        debug.style.display = "block";
        debug.innerText += `[${m}] ${data.error?.message || "使用不可"}\n`;
      }
    } catch(e) { console.log(m + " failed"); }
  }
  if(!success) txt.innerText = "全ての2.5/2.0モデルで生成に失敗しました。APIキーまたはネットワークを確認してください。";
  btn.disabled = false;
}
window.askGemini = askGemini;

window.saveAI = () => {
  if(!lastAIResult) return;
  const subj = document.getElementById('ai-subj-sel').value;
  const catMap = {"線形代数":"la","微積分":"ca","複素関数論":"cf","常微分方程式":"de","機械学習":"ml","アルゴリズム":"cs"};
  BANK.push({cat: catMap[subj] || 'cs', q: "AI生成問題 (" + subj + ")", a: lastAIResult});
  localStorage.setItem('study_v23_bank', JSON.stringify(BANK));
  alert("ワードバンクに保存しました。"); renderBank();
};

/* ══════════════════════════════════════
   STUDY & LOGS & ANALYTICS
══════════════════════════════════════ */
function renderStudy() {
  const cont = document.getElementById('study-content'), data = curMode==='fc' ? BANK.filter(b=>b.cat===curSubj) : (QUIZZES[curSubj] || []);
  if(!data.length) { cont.innerHTML = `<div class="card">まだデータがありません。</div>`; return; }
  const it = data[curIdx % data.length];
  if(curMode === 'fc') {
    cont.innerHTML = `<div class="fc-card" onclick="this.innerText='${it.a}'">${it.q}</div><button class="btn-p" style="margin-top:20px" onclick="curIdx++;renderStudy()">次のカードへ</button>`;
  } else {
    cont.innerHTML = `<div class="card"><div>${it.q}</div>${it.o.map((o,i)=>`<button class="chip" style="display:block;width:100%;margin-top:10px;text-align:left" onclick="alert(i===${it.a}?'正解':'不正解')">${o}</button>`).join('')}</div>`;
  }
}

function renderBank() {
  const container = document.getElementById('bank-list-html');
  container.innerHTML = BANK.slice().reverse().map((it, i) => `
    <div class="bank-item">
      <span style="color:${SUBJECTS[it.cat].color}; font-weight:bold">${SUBJECTS[it.cat].name}</span>
      <span><strong>${it.q}</strong></span>
      <button style="background:var(--pink); border:none; color:#fff; padding:4px; border-radius:4px; cursor:pointer" onclick="BANK.splice(${BANK.length-1-i},1);localStorage.setItem('study_v23_bank',JSON.stringify(BANK));renderBank();">✕</button>
    </div>
  `).join('');
}

function addLog() {
  const subj = document.getElementById('log-subj-sel').value, chap = document.getElementById('log-chap').value, dur = parseInt(document.getElementById('log-dur').value);
  if(!chap || !dur) return alert("入力してください");
  push(ref(db, 'logs'), {subj, chap, dur, timestamp: Date.now(), date: new Date().toLocaleDateString('ja-JP')});
  alert("ログを保存しました。");
}

function renderAnalytics() {
  const sum = document.getElementById('ana-summary');
  sum.innerHTML = `<div class="ana-card"><div class="ana-val">${BANK.length}</div>知識総数</div><div class="ana-card"><div class="ana-val" style="color:var(--green)">Ready</div>状態</div>`;
}

function init() {
  updateCountdown();
  const chips = document.getElementById('subj-chips');
  chips.innerHTML = Object.keys(SUBJECTS).map(k => `<button class="chip" onclick="curSubj='${k}';curIdx=0;renderStudy()">${SUBJECTS[k].name}</button>`).join('');
  renderBank(); renderStudy();
  setTimeout(initGalaxy, 500);
}
init();
</script>
